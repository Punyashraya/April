<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>April ❤️</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#020204;
  font-family:'Segoe UI';
}

/* INTRO */
#intro {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:black;
  cursor:pointer;
  z-index:10;
}

.heart {
  width:90px;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  50% { transform:scale(1.15); }
}

/* TEXT */
.message-box{
 position:absolute;
 right:6%;
 top:28%;
 width:240px;
 color:#fff;
 font-size:15px;
 line-height:1.7;
 opacity:1;
 transition:opacity 1s ease;
}

/* BUTTON */
#finalBtn{
 position:absolute;
 left:6%;
 bottom:40px;
 padding:12px 18px;
 font-size:18px;
 border:none;
 border-radius:20px;
 background:rgba(255,100,150,0.25);
 color:white;
 backdrop-filter:blur(10px);
 cursor:pointer;
 opacity:0;
 transition:all 0.8s ease;
 z-index:5;
}

/* vignette */
body::after{
 content:"";
 position:fixed;
 inset:0;
 pointer-events:none;
 background:radial-gradient(circle, transparent 50%, rgba(0,0,0,0.65));
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>
<div class="message-box" id="box"></div>
<button id="finalBtn">💖</button>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let leaves=[],particles=[],branches=[];
let finalPhase=false;

// TREE GENERATION
function gen(){
  let cx=c.width/2,cy=c.height*0.45;

  for(let i=0;i<1300;i++){
    let t=Math.random()*Math.PI*2,r=Math.random();

    let px=16*Math.pow(Math.sin(t),3);
    let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let lx=cx+px*18*r,ly=cy+py*18*r;

    leaves.push({
      x:lx,y:ly,
      s:Math.random()*3+4,
      c:["#ff4d6d","#ff758f","#ff8fa3","#ffd1dc","#ffc2d1"][Math.floor(Math.random()*5)],
      p:Math.random()*1000
    });

    branches.push({
      ex:lx,ey:ly,
      mx:(cx+lx)/2+(Math.random()*20-10),
      my:(cy+ly)/2,
      w:0.5+Math.random()*0.4,
      alpha:0.35+Math.random()*0.2
    });
  }

  for(let i=0;i<150;i++){
    particles.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      size:Math.random()*4+1.5,
      speed:Math.random()*0.4+0.2,
      phase:Math.random()*1000,
      type:Math.random()<0.5?0:(Math.random()<0.8?1:2)
    });
  }
}
gen();

// (⚠️ everything else unchanged... skipping for brevity in explanation)

// ===============================
// 💖 CINEMATIC FINAL TEXT (FIXED)
// ===============================

const observer = new MutationObserver(() => {

  const finalText = Array.from(document.body.children)
    .find(el => el.innerHTML && el.innerHTML.includes("Happy Birthday"));

  if(!finalText || finalText._enhanced) return;

  finalText._enhanced = true;

  finalText.style.fontWeight = "600";
  finalText.style.letterSpacing = "1px";
  finalText.style.lineHeight = "1.3";

  finalText.style.opacity = "0";
  finalText.style.transform = "translate(-50%, -40%) scale(0.9)";
  finalText.style.filter = "blur(8px)";

  finalText.style.background = "linear-gradient(90deg,#ff8fa3,#ffd1dc,#ff8fa3)";
  finalText.style.backgroundSize = "200% 100%";
  finalText.style.webkitBackgroundClip = "text";
  finalText.style.webkitTextFillColor = "transparent";

  finalText.style.textShadow = `
    0 0 10px rgba(255,120,160,0.6),
    0 0 25px rgba(255,120,160,0.5),
    0 0 60px rgba(255,80,140,0.4)
  `;

  requestAnimationFrame(()=>{
    finalText.style.transition = "all 2s cubic-bezier(.2,.8,.2,1)";
    finalText.style.opacity = "1";
    finalText.style.transform = "translate(-50%, -50%) scale(1)";
    finalText.style.filter = "blur(0px)";
  });

  let t = 0;

  function animateText(){
    t += 0.02;

    let scale = 1 + Math.sin(t) * 0.025;
    let floatY = Math.sin(t * 0.8) * 6;
    let glow = 20 + Math.sin(t * 2) * 15;
    let bgPos = (t * 40) % 200;

    finalText.style.transform =
      `translate(-50%, calc(-50% + ${floatY}px)) scale(${scale})`;

    finalText.style.textShadow = `
      0 0 ${glow}px rgba(255,120,160,0.6),
      0 0 ${glow*2}px rgba(255,80,140,0.4)
    `;

    finalText.style.backgroundPosition = `${bgPos}% 50%`;

    finalText.style.letterSpacing =
      `${1 + Math.sin(t*0.5) * 0.5}px`;

    requestAnimationFrame(animateText);
  }

  animateText();

  function pullParticles(){
    let rect = finalText.getBoundingClientRect();
    let cx = rect.left + rect.width/2;
    let cy = rect.top + rect.height/2;

    particles.forEach(p=>{
      let dx = cx - p.x;
      let dy = cy - p.y;

      p.x += dx * 0.002;
      p.y += dy * 0.002;
    });

    requestAnimationFrame(pullParticles);
  }

  pullParticles();
});

observer.observe(document.body, { childList: true });

</script>

</body>
</html>
