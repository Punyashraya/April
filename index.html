<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

canvas {
  display: block;
}

/* 💬 Messages stack on right */
.message-box {
  position: absolute;
  right: 5%;
  top: 25%;
  width: 300px;
  font-size: 20px;
  line-height: 1.6;
}

.message {
  opacity: 0;
  margin-bottom: 10px;
  transform: translateY(10px);
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

// ❤️ Heart equation
function heartShape(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

// 🌳 CREATE A BIG, FULL TREE
for (let i = 0; i < 2500; i++) {  // 🔥 increased density
  let t = Math.random() * Math.PI * 2;
  let r = Math.random(); // fills inside

  let pos = heartShape(t);

  hearts.push({
    baseX: canvas.width * 0.35 + pos.x * 15 * r, // 🔥 wider tree
    baseY: canvas.height * 0.45 + pos.y * 15 * r,
    offset: Math.random() * 10,
    size: Math.random() * 6 + 3,
    color: `hsl(${Math.random()*360}, 100%, 60%)`
  });
}

// 🌳 Tree trunk (bigger)
function drawTrunk() {
  ctx.fillStyle = "#ffc0cb";
  ctx.fillRect(canvas.width * 0.34, canvas.height * 0.5, 25, 250);
}

// 💖 Draw heart
function drawHeart(x, y, size, color) {
  ctx.beginPath();
  ctx.fillStyle = color;

  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x, y - size, x - size, y - size, x - size, y);
  ctx.bezierCurveTo(x - size, y + size, x, y + size * 1.5, x, y + size * 2);
  ctx.bezierCurveTo(x, y + size * 1.5, x + size, y + size, x + size, y);
  ctx.bezierCurveTo(x + size, y - size, x, y - size, x, y);

  ctx.fill();
}

// ✨ Animate
function animate(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawTrunk();

  hearts.forEach(h => {
    let float = Math.sin(time * 0.002 + h.offset) * 3;
    drawHeart(h.baseX, h.baseY + float, h.size, h.color);
  });

  requestAnimationFrame(animate);
}

animate();

// 💬 STACKING MESSAGES
const messages = [
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything better ✨",
  "I hope you smile today 😊",
  "You are truly special 💖",
  "This tree is just for you 🌸"
];

const box = document.getElementById("messageBox");
let index = 0;

function addMessage() {
  if (index >= messages.length) return;

  const div = document.createElement("div");
  div.className = "message";
  div.textContent = messages[index];

  box.appendChild(div);
  index++;
}

setInterval(addMessage, 2000);

</script>

</body>
</html>
