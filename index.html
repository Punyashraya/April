<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#020204;
  font-family:'Segoe UI';
}

/* 💓 INTRO */
#intro {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:black;
  cursor:pointer;
  z-index:10;
}

.heart {
  width:90px;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  50% { transform:scale(1.15); }
}

/* 💌 TEXT */
.message-box{
 position:absolute;
 right:6%;
 top:28%;
 width:240px;
 color:#fff;
 font-size:15px;
 line-height:1.7;
}

.message{
 opacity:0;
 transform:translateY(20px);
 transition:all 1.5s ease;
 margin-bottom:12px;
 text-shadow:0 0 12px rgba(255,180,140,0.25);
}

/* 💖 FINAL CENTER TEXT */
#finalText{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:48px;
 text-align:center;
 color:white;
 opacity:0;
 transition:all 2s ease;
 text-shadow:0 0 30px #ff6fa5, 0 0 70px #ff2e88;
}

/* 🎥 vignette */
body::after{
 content:"";
 position:fixed;
 inset:0;
 pointer-events:none;
 background:radial-gradient(circle, transparent 50%, rgba(0,0,0,0.65));
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" id="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>
<div class="message-box" id="box"></div>
<div id="finalText">Happy Birthday<br>Wewe 💕</div>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let leaves=[],particles=[],branches=[],petals=[];
let phase=1; // 1=tree, 2=final

// 🌳 GENERATE
function gen(){
  let cx=c.width/2,cy=c.height*0.45;

  for(let i=0;i<1300;i++){
    let t=Math.random()*Math.PI*2,r=Math.random();

    let px=16*Math.pow(Math.sin(t),3);
    let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let lx=cx+px*18*r,ly=cy+py*18*r;

    leaves.push({
      x:lx,y:ly,
      s:Math.random()*3+4,
      c:["#ff4d6d","#ff758f","#ff8fa3","#ffd1dc","#ffc2d1"][Math.floor(Math.random()*5)],
      p:Math.random()*1000
    });

    let midX=(cx+lx)/2+(Math.random()*20-10);
    let midY=(cy+ly)/2;

    branches.push({
      ex:lx,ey:ly,
      mx:midX,my:midY,
      w:0.5+Math.random()*0.4,
      alpha:0.35+Math.random()*0.2
    });
  }

  for(let i=0;i<120;i++){
    particles.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      size:Math.random()*4+1,
      speed:Math.random()*0.5+0.2,
      phase:Math.random()*1000,
      type:Math.floor(Math.random()*3)
    });
  }

  for(let i=0;i<40;i++){
    petals.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      size:Math.random()*3+2,
      speed:Math.random()*0.3+0.1,
      drift:Math.random()*2-1
    });
  }
}
gen();

// 🖱️ mouse
let mouse={x:0,y:0};
addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// 🌌 BG
function bg(){
  let g=x.createRadialGradient(c.width/2,c.height/2,50,c.width/2,c.height/2,600);
  g.addColorStop(0,"#1a0a1f");
  g.addColorStop(1,"#020204");
  x.fillStyle=g;
  x.fillRect(0,0,c.width,c.height);
}

// ❤️ heart
function heart(px,py,s,col){
  x.beginPath();
  x.moveTo(px,py);
  x.bezierCurveTo(px,py-s,px-s,py-s,px-s,py);
  x.bezierCurveTo(px-s,py+s,px,py+s*1.5,px,py+s*2);
  x.bezierCurveTo(px,py+s*1.5,px+s,py+s,px+s,py);
  x.bezierCurveTo(px+s,py-s,px,py-s,px,py);
  x.fillStyle=col;
  x.shadowBlur=10;
  x.shadowColor=col;
  x.fill();
  x.shadowBlur=0;
}

// ❄️⭐ PARTICLES
function drawParticle(p,t){
  if(p.type===0){
    let f=Math.sin(t*0.004+p.phase)*0.5+0.5;
    let s=p.size*(1+f*0.5);

    x.beginPath();
    for(let i=0;i<5;i++){
      let a=i*Math.PI*2/5;
      let r=i%2===0?s:s*0.4;
      x.lineTo(p.x+Math.cos(a)*r,p.y+Math.sin(a)*r);
    }
    x.closePath();

    x.fillStyle="rgba(255,230,140,"+(0.7+f*0.3)+")";
    x.shadowBlur=15;
    x.shadowColor="#ffd166";
    x.fill();
    x.shadowBlur=0;
  }
  else if(p.type===1){
    let s=p.size*1.2;
    x.strokeStyle="rgba(255,255,255,0.7)";
    x.lineWidth=0.8;

    x.beginPath();
    for(let i=0;i<6;i++){
      let a=i*Math.PI/3;
      x.moveTo(p.x,p.y);
      x.lineTo(p.x+Math.cos(a)*s,p.y+Math.sin(a)*s);
    }
    x.stroke();
  }
  else{
    x.beginPath();
    x.arc(p.x,p.y,p.size*0.6,0,Math.PI*2);
    x.fillStyle="rgba(255,240,180,0.5)";
    x.fill();
  }

  p.y-=p.speed;
  p.x+=Math.sin(t*0.001+p.phase)*0.3;

  if(p.y<0){
    p.y=c.height;
    p.x=Math.random()*c.width;
  }
}

// 🌸 petals
function drawPetal(p){
  x.beginPath();
  x.ellipse(p.x,p.y,p.size,p.size*0.6,0,0,Math.PI*2);
  x.fillStyle="rgba(255,180,200,0.5)";
  x.fill();

  p.y+=p.speed;
  p.x+=p.drift;

  if(p.y>c.height){
    p.y=0;
    p.x=Math.random()*c.width;
  }
}

// 🌳 tree
let grow=0;
function tree(){
  if(phase===2) return; // ❌ remove tree in final phase

  let cx=c.width/2,base=c.height*0.8,top=c.height*0.5;
  let ty=base-(base-top)*grow;

  let grad=x.createLinearGradient(cx,base,cx,ty);
  grad.addColorStop(0,"#5a3b24");
  grad.addColorStop(1,"#8b5e3c");

  x.lineWidth=22;
  x.strokeStyle=grad;
  x.beginPath();
  x.moveTo(cx,base);
  x.lineTo(cx,ty);
  x.stroke();

  branches.forEach(b=>{
    let ex=cx+(b.ex-cx)*grow;
    let ey=ty+(b.ey-ty)*grow;

    let dist=Math.hypot(ex-cx,ey-ty)/300;
    let alpha=(b.alpha*(1-dist))+0.25;

    x.beginPath();
    x.lineWidth=b.w;
    x.strokeStyle="rgba(190,130,80,"+alpha+")";

    x.moveTo(cx,ty);
    x.quadraticCurveTo(b.mx,b.my,ex,ey);
    x.stroke();
  });
}

// 🎬 ANIM
function anim(t){
  bg();

  if(grow<1) grow+=0.01;

  tree();

  if(phase===1){
    leaves.forEach(l=>{
      if(grow>0.6){
        let xPos=l.x;
        let yPos=l.y+Math.sin(t*0.002+l.p)*2;

        heart(xPos,yPos,l.s,l.c);
      }
    });
  }

  particles.forEach(p=>drawParticle(p,t));
  petals.forEach(p=>drawPetal(p));

  requestAnimationFrame(anim);
}

// 💌 TEXT
const msgs=[
 "Hey you 💕",
 "Happy Birthday 🎂",
 "You make everything brighter ✨",
 "Every moment with you matters 💖",
 "This little world is for you 🌸"
];

function showText(){
  const box=document.getElementById("box");

  msgs.forEach((m,i)=>{
    setTimeout(()=>{
      let d=document.createElement("div");
      d.className="message";
      d.textContent=m;
      box.appendChild(d);

      setTimeout(()=>{
        d.style.opacity=1;
        d.style.transform="translateY(0)";
      },100);

    },i*2500);
  });

  // 🎬 AUTO FINAL TRANSITION
  setTimeout(()=>{
    phase=2;
    box.innerHTML="";
    document.getElementById("finalText").style.opacity=1;
  }, msgs.length*2500 + 2000);
}

// 🎬 INTRO
document.getElementById("intro").onclick=()=>{
  const heart=document.getElementById("heart");

  heart.style.transition="1s";
  heart.style.transform="translateY(300px) scale(0.8)";
  heart.style.opacity=0.7;

  setTimeout(()=>{ intro.style.opacity=0; },800);

  setTimeout(()=>{
    intro.style.display="none";
    anim(0);
    showText();
  },1500);
};
</script>

</body>
</html>
