<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: black;
}

/* 🌑 Intro screen */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #000000, #050505);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  cursor: pointer;
}

/* 💓 Pulsating heart */
.heart {
  width: 60px;
  height: 60px;
  background: #ff4d6d;
  transform: rotate(45deg);
  animation: pulse 1.5s infinite;
  position: relative;
}

.heart::before,
.heart::after {
  content: "";
  width: 60px;
  height: 60px;
  background: #ff4d6d;
  border-radius: 50%;
  position: absolute;
}

.heart::before { top: -30px; left: 0; }
.heart::after { left: -30px; top: 0; }

@keyframes pulse {
  0%,100% { transform: scale(1) rotate(45deg); }
  50% { transform: scale(1.2) rotate(45deg); }
}

#introText {
  margin-top: 20px;
  color: rgba(255,255,255,0.6);
  font-size: 18px;
  letter-spacing: 2px;
}

/* 🌸 Messages */
.message-box {
  position: absolute;
  right: 6%;
  top: 30%;
  width: 320px;
  color: white;
  font-size: 24px;
  line-height: 1.8;
  font-weight: 300;
}

.message {
  opacity: 0;
  transform: translateY(30px);
  filter: blur(10px);
  transition: all 1.5s ease;
  margin-bottom: 16px;
}
</style>
</head>

<body>

<!-- 🌑 INTRO -->
<div id="intro">
  <div class="heart"></div>
  <div id="introText">tap gently 💕</div>
</div>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const centerX = () => canvas.width/2;
const centerY = () => canvas.height*0.42;

// 🌅 BACKGROUND (soft & romantic)
function drawBackground(){
  let sky = ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,"#2b1055");
  sky.addColorStop(0.5,"#7597de");
  sky.addColorStop(1,"#fbc2eb");

  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // glow
  let glow = ctx.createRadialGradient(
    canvas.width*0.7, canvas.height*0.3, 10,
    canvas.width*0.7, canvas.height*0.3, 300
  );
  glow.addColorStop(0,"rgba(255,200,200,0.4)");
  glow.addColorStop(1,"rgba(255,200,200,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ground
  ctx.fillStyle = "#1b4332";
  ctx.fillRect(0, canvas.height*0.75, canvas.width, canvas.height);
}

// 💖 tree
const colors = ["#ff4d6d","#ff758f","#ff8fa3","#ffd166","#f4a261"];
let hearts=[];

function generateTree(){
  hearts=[];
  for(let i=0;i<2600;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    hearts.push({
      x:centerX()+x*20*r,
      y:centerY()+y*20*r,
      size:Math.random()*3+5,
      color:colors[Math.floor(Math.random()*colors.length)],
      phase:Math.random()*1000
    });
  }
}
generateTree();

// 🌳 trunk
function drawTrunk(){
  let x=centerX();
  let y=canvas.height*0.8;

  ctx.beginPath();
  ctx.moveTo(x-35,y);
  ctx.bezierCurveTo(x-60,y-100, x-25,y-200, x-15,y-260);
  ctx.lineTo(x+15,y-260);
  ctx.bezierCurveTo(x+25,y-200, x+60,y-100, x+35,y);
  ctx.fillStyle="#6b3e26";
  ctx.fill();
}

// ❤️ heart
function drawHeart(x,y,size,color){
  ctx.beginPath();
  ctx.fillStyle=color;

  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
  ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
  ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
  ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);

  ctx.fill();
}

// 🎬 animation control
let started = false;

function animate(time){
  if(!started) return;

  drawBackground();
  drawTrunk();

  hearts.forEach(h=>{
    let float=Math.sin(time*0.002+h.phase)*2;
    drawHeart(h.x, h.y+float, h.size, h.color);
  });

  requestAnimationFrame(animate);
}

// 💌 messages (aesthetic)
const messages=[
  "Hey you...",
  "Happy Birthday 🎂",
  "You make my world brighter ✨",
  "Every moment with you matters",
  "This little world is for you 💖"
];

function showMessages(){
  const box=document.getElementById("messageBox");

  messages.forEach((msg,i)=>{
    setTimeout(()=>{
      const div=document.createElement("div");
      div.className="message";
      div.textContent=msg;
      box.appendChild(div);

      setTimeout(()=>{
        div.style.opacity=1;
        div.style.transform="translateY(0)";
        div.style.filter="blur(0)";
      },100);

    }, i*2500);
  });
}

// 🌑 intro click
document.getElementById("intro").onclick = ()=>{
  document.getElementById("intro").style.opacity=0;

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    started = true;
    animate(0);
    showMessages();
  },1000);
};

</script>

</body>
</html>
