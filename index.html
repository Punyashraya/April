<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #050505;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌑 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #050505;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  transition: opacity 1.5s ease;
}

/* 💓 HEART (NO SQUARE GLOW) */
.heart {
  width: 100px;
  height: 100px;
  animation: pulse 1.6s infinite;
}

.heart path {
  fill: #5a0f2e;
  stroke: #ff2e88;
  stroke-width: 2.5;
}

/* layered glow (cleaner than drop-shadow) */
.heart {
  filter:
    drop-shadow(0 0 4px #ff2e88)
    drop-shadow(0 0 10px #ff2e88)
    drop-shadow(0 0 20px #ff2e88);
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}

/* 💌 TEXT */
.message-box {
  position: absolute;
  right: 6%;
  top: 30%;
  width: 260px;
  color: white;
  font-size: 18px;
  line-height: 1.7;
}

.message {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.5s ease;
  margin-bottom: 12px;
  text-shadow: 0 0 8px rgba(255,100,150,0.3);
}
</style>
</head>

<body>

<!-- 💓 INTRO -->
<div id="intro">
  <svg class="heart" viewBox="0 0 100 100">
    <path d="M50 90 
             L20 60 
             A20 20 0 1 1 50 30 
             A20 20 0 1 1 80 60 
             Z"/>
  </svg>
</div>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const centerX = () => canvas.width/2;
const centerY = () => canvas.height*0.45;

// 🌌 BACKGROUND
function drawBackground(){
  let grad = ctx.createRadialGradient(
    centerX(), centerY(), 50,
    centerX(), centerY(), 500
  );
  grad.addColorStop(0,"#111");
  grad.addColorStop(1,"#050505");

  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 💖 TREE
const colors = ["#ff4d6d","#ff758f","#ff8fa3"];
let hearts=[];
let branches=[];

function generateTree(){
  hearts=[];
  branches=[];

  let trunkTop = {
    x:centerX(),
    y:canvas.height*0.5
  };

  for(let i=0;i<2200;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let hx=centerX()+x*18*r;
    let hy=centerY()+y*18*r;

    hearts.push({
      x:hx,
      y:hy,
      size:Math.random()*3+5,
      color:colors[Math.floor(Math.random()*colors.length)],
      phase:Math.random()*1000
    });

    // 🌿 curved branch (STATIC)
    branches.push({
      sx: trunkTop.x,
      sy: trunkTop.y,
      c1x: trunkTop.x + (hx-trunkTop.x)*0.3 + (Math.random()*40-20),
      c1y: trunkTop.y + (hy-trunkTop.y)*0.3,
      c2x: trunkTop.x + (hx-trunkTop.x)*0.7 + (Math.random()*40-20),
      c2y: trunkTop.y + (hy-trunkTop.y)*0.7,
      ex: hx,
      ey: hy
    });
  }
}
generateTree();

// 🖱️ HOVER
let mouse={x:0,y:0};
window.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// 🌳 TRUNK
function drawTrunk(){
  let x=centerX();
  let y=canvas.height*0.75;

  ctx.beginPath();
  ctx.moveTo(x-25,y);
  ctx.bezierCurveTo(x-40,y-100, x-15,y-200, x-10,y-250);
  ctx.lineTo(x+10,y-250);
  ctx.bezierCurveTo(x+15,y-200, x+40,y-100, x+25,y);
  ctx.fillStyle="#6b3e26";
  ctx.fill();
}

// 🌿 BRANCHES
function drawBranches(){
  ctx.strokeStyle="rgba(90,50,20,0.18)";
  ctx.lineWidth=0.6;

  branches.forEach(b=>{
    ctx.beginPath();
    ctx.moveTo(b.sx,b.sy);
    ctx.bezierCurveTo(b.c1x,b.c1y,b.c2x,b.c2y,b.ex,b.ey);
    ctx.stroke();
  });
}

// ❤️ HEART
function drawHeart(x,y,size,color){
  ctx.beginPath();
  ctx.fillStyle=color;

  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
  ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
  ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
  ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);

  ctx.fill();
}

let started=false;

// ✨ ANIMATION
function animate(time){
  if(!started) return;

  drawBackground();
  drawTrunk();
  drawBranches();

  hearts.forEach(h=>{
    let float=Math.sin(time*0.002+h.phase)*2;

    let dx=h.x-mouse.x;
    let dy=h.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    let push=dist<120?(120-dist)/6:0;

    let x=h.x+(dx/dist)*push||h.x;
    let y=h.y+float+(dy/dist)*push||h.y;

    drawHeart(x,y,h.size,h.color);
  });

  requestAnimationFrame(animate);
}

// 💌 TEXT
const messages=[
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything brighter ✨",
  "Every moment with you matters 💖",
  "This little world is for you 🌸"
];

function showMessages(){
  const box=document.getElementById("messageBox");

  messages.forEach((msg,i)=>{
    setTimeout(()=>{
      const div=document.createElement("div");
      div.className="message";
      div.textContent=msg;
      box.appendChild(div);

      setTimeout(()=>{
        div.style.opacity=1;
        div.style.transform="translateY(0)";
      },100);

    }, i*2500);
  });
}

// 🎬 TRANSITION
document.getElementById("intro").onclick=()=>{
  const intro=document.getElementById("intro");

  intro.style.opacity=0;

  setTimeout(()=>{
    intro.style.display="none";
    started=true;
    animate(0);
    showMessages();
  },1200);
};
</script>

</body>
</html>
