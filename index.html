<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #050505;
  font-family: sans-serif;
}

/* 🌑 INTRO */
#intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  z-index: 9999;
  cursor: pointer;
}

/* 💓 HEART */
.heart {
  width: 140px;
  pointer-events: none; /* 🔥 important */
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

.heart path {
  fill: #4a0f2a;
  stroke: #ff2e88;
  stroke-width: 2.5;
}

/* 🔥 CRITICAL */
canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="intro">
  <svg class="heart" viewBox="0 0 100 100">
    <path d="M50 85 
             L20 55 
             A20 20 0 1 1 50 25 
             A20 20 0 1 1 80 55 
             Z"/>
  </svg>
</div>

<canvas id="canvas"></canvas>

<script>
const intro = document.getElementById("intro");

/* 💓 CLICK (THIS WILL WORK 100%) */
intro.onclick = () => {
  console.log("CLICKED ✅");

  intro.style.display = "none";

  startApp();
};

/* 🌳 MAIN APP */
function startApp(){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener("resize", resize);

  const hearts=[];

  for(let i=0;i<800;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    hearts.push({
      x:canvas.width/2+x*15*r,
      y:canvas.height/2+y*15*r,
      size:Math.random()*3+4
    });
  }

  function drawHeart(x,y,s){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
    ctx.bezierCurveTo(x-s,y+s,x,y+s*1.6,x,y+s*2);
    ctx.bezierCurveTo(x,y+s*1.6,x+s,y+s,x+s,y);
    ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);
    ctx.fillStyle="#ff4d6d";
    ctx.fill();
  }

  function animate(){
    ctx.fillStyle="#050505";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    hearts.forEach(h=>{
      drawHeart(h.x,h.y,h.size);
    });

    requestAnimationFrame(animate);
  }

  animate();
}
</script>

</body>
</html>
