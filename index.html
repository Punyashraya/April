<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: black;
}

/* 🌑 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  cursor: pointer;
  transition: opacity 1.5s ease;
}

/* 💓 Neon heart */
.heart {
  width: 70px;
  height: 70px;
  background: #ff2e88;
  transform: rotate(45deg);
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 20px #ff2e88, 0 0 40px #ff2e88, 0 0 80px #ff2e88;
}

.heart::before,
.heart::after {
  content: "";
  width: 70px;
  height: 70px;
  background: #ff2e88;
  border-radius: 50%;
  position: absolute;
}

.heart::before { top: -35px; left: 0; }
.heart::after { left: -35px; top: 0; }

@keyframes pulse {
  0%,100% { transform: scale(1) rotate(45deg); }
  50% { transform: scale(1.25) rotate(45deg); }
}

#introText {
  margin-top: 20px;
  color: rgba(255,255,255,0.6);
  font-size: 16px;
  letter-spacing: 2px;
}

/* 💌 TEXT */
.message-box {
  position: absolute;
  right: 6%;
  top: 30%;
  width: 280px;
  color: white;
  font-size: 20px;
  line-height: 1.7;
  text-align: left;
}

.message {
  opacity: 0;
  transform: translateY(20px);
  filter: blur(8px);
  transition: all 1.5s ease;
  margin-bottom: 14px;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div id="intro">
  <div class="heart"></div>
  <div id="introText">tap 💕</div>
</div>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const centerX = () => canvas.width/2;
const centerY = () => canvas.height*0.42;

// 🌅 background
function drawBackground(){
  let sky = ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,"#2b1055");
  sky.addColorStop(0.5,"#7597de");
  sky.addColorStop(1,"#fbc2eb");

  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // glow
  let glow = ctx.createRadialGradient(
    canvas.width*0.7, canvas.height*0.3, 10,
    canvas.width*0.7, canvas.height*0.3, 300
  );
  glow.addColorStop(0,"rgba(255,200,200,0.4)");
  glow.addColorStop(1,"rgba(255,200,200,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ground
  ctx.fillStyle = "#1b4332";
  ctx.fillRect(0, canvas.height*0.75, canvas.width, canvas.height);
}

// 💖 tree
const colors = ["#ff4d6d","#ff758f","#ff8fa3","#ffd166","#f4a261"];
let hearts=[];

function generateTree(){
  hearts=[];
  for(let i=0;i<2600;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    hearts.push({
      x:centerX()+x*20*r,
      y:centerY()+y*20*r,
      size:Math.random()*3+5,
      color:colors[Math.floor(Math.random()*colors.length)],
      phase:Math.random()*1000
    });
  }
}
generateTree();

// 🖱️ hover interaction (RESTORED)
let mouse={x:0,y:0};
window.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// 🌳 trunk
function drawTrunk(){
  let x=centerX();
  let y=canvas.height*0.8;

  ctx.beginPath();
  ctx.moveTo(x-35,y);
  ctx.bezierCurveTo(x-60,y-100, x-25,y-200, x-15,y-260);
  ctx.lineTo(x+15,y-260);
  ctx.bezierCurveTo(x+25,y-200, x+60,y-100, x+35,y);
  ctx.fillStyle="#6b3e26";
  ctx.fill();
}

// ❤️ heart
function drawHeart(x,y,size,color){
  ctx.beginPath();
  ctx.fillStyle=color;

  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
  ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
  ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
  ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);

  ctx.fill();
}

let started=false;

// ✨ animation
function animate(time){
  if(!started) return;

  ctx.save();
  ctx.globalAlpha = Math.min(1, time*0.0005); // fade-in effect

  drawBackground();
  drawTrunk();

  hearts.forEach(h=>{
    let float=Math.sin(time*0.002+h.phase)*2;

    let dx=h.x-mouse.x;
    let dy=h.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    let push=dist<120?(120-dist)/5:0;

    let x=h.x+(dx/dist)*push||h.x;
    let y=h.y+float+(dy/dist)*push||h.y;

    drawHeart(x,y,h.size,h.color);
  });

  ctx.restore();

  requestAnimationFrame(animate);
}

// 💌 messages (refined)
const messages=[
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything brighter ✨",
  "Every moment with you matters 💖",
  "This little world is for you 🌸"
];

function showMessages(){
  const box=document.getElementById("messageBox");

  messages.forEach((msg,i)=>{
    setTimeout(()=>{
      const div=document.createElement("div");
      div.className="message";
      div.textContent=msg;
      box.appendChild(div);

      setTimeout(()=>{
        div.style.opacity=1;
        div.style.transform="translateY(0)";
        div.style.filter="blur(0)";
      },100);

    }, i*2500);
  });
}

// 🌑 intro click
document.getElementById("intro").onclick=()=>{
  document.getElementById("intro").style.opacity=0;

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    started=true;
    animate(0);
    showMessages();
  },1500);
};

</script>

</body>
</html>
