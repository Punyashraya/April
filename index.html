<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>April ❤️</title>

<style>
body { margin:0; overflow:hidden; background:#020204; font-family:'Segoe UI'; }

#intro {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:black; cursor:pointer; z-index:10;
}

.heart { width:90px; animation:pulse 1.6s infinite; }
@keyframes pulse { 50% { transform:scale(1.15); } }

.message-box{
 right:6%; top:28%; width:240px;
 color:#fff; font-size:15px; line-height:1.7;
 position:absolute;
}

#finalBtn{
 position:absolute; left:6%; bottom:40px;
 padding:12px 18px; font-size:18px;
 border:none; border-radius:20px;
 background:rgba(255,100,150,0.25);
 color:white; cursor:pointer; opacity:0;
}

body::after{
 content:""; position:fixed; inset:0;
 background:radial-gradient(circle, transparent 50%, rgba(0,0,0,0.65));
 pointer-events:none;
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>
<div id="box" class="message-box"></div>
<button id="finalBtn">💖</button>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let leaves=[],branches=[],particles=[];
let finalPhase=false;

function gen(){
 let cx=c.width/2,cy=c.height*0.45;

 for(let i=0;i<1200;i++){
  let t=Math.random()*Math.PI*2,r=Math.random();

  let px=16*Math.pow(Math.sin(t),3);
  let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

  let lx=cx+px*18*r,ly=cy+py*18*r;

  leaves.push({
   x:lx,y:ly,
   baseX:lx,baseY:ly,
   s:Math.random()*3+4,
   c:["#ff4d6d","#ff758f","#ff8fa3","#ffd1dc"][Math.floor(Math.random()*4)],
   p:Math.random()*1000
  });

  branches.push({
   ex:lx,ey:ly,
   mx:(cx+lx)/2,
   my:(cy+ly)/2,
   w:0.6
  });
 }

 for(let i=0;i<120;i++){
  particles.push({
   x:Math.random()*c.width,
   y:Math.random()*c.height,
   size:Math.random()*3+1,
   speed:Math.random()*0.3+0.2
  });
 }
}
gen();

let mouse={x:0,y:0};
addEventListener("mousemove",e=>{
 mouse.x=e.clientX;
 mouse.y=e.clientY;
});

function bg(){
 let g=x.createRadialGradient(c.width/2,c.height/2,50,c.width/2,c.height/2,600);
 g.addColorStop(0,"#1a0a1f");
 g.addColorStop(1,"#020204");
 x.fillStyle=g;
 x.fillRect(0,0,c.width,c.height);
}

// 🌿 SAFE LEAF POSITION (shared logic)
function getLeafPos(l,t){
 let float=Math.sin(t*0.002+l.p)*2;

 let dx=l.baseX-mouse.x;
 let dy=l.baseY-mouse.y;
 let dist=Math.sqrt(dx*dx+dy*dy);

 let xPos=l.baseX;
 let yPos=l.baseY+float;

 if(dist<120 && dist!==0){
  let f=(120-dist)*0.05;
  xPos+=dx/dist*f;
  yPos+=dy/dist*f;
 }

 // wind (visual only)
 let wx=Math.cos(t*0.0005)*2;
 let wy=Math.sin(t*0.0005)*1;

 xPos+=wx;
 yPos+=wy;

 return {x:xPos,y:yPos};
}

// 🌿 DRAW LEAF
function drawLeaf(l,t){
 let p=getLeafPos(l,t);

 x.beginPath();
 x.moveTo(p.x,p.y);
 x.bezierCurveTo(p.x,p.y-l.s,p.x-l.s,p.y-l.s,p.x-l.s,p.y);
 x.bezierCurveTo(p.x-l.s,p.y+l.s,p.x,p.y+l.s*2,p.x,p.y+l.s*2);
 x.bezierCurveTo(p.x,p.y+l.s*2,p.x+l.s,p.y+l.s,p.x+l.s,p.y);
 x.bezierCurveTo(p.x+l.s,p.y-l.s,p.x,p.y-l.s,p.x,p.y);

 x.fillStyle=l.c;
 x.fill();
}

// 🌳 TREE (attached to leaves)
let grow=0;
function tree(t){
 if(finalPhase) return;

 let cx=c.width/2,base=c.height*0.8,top=c.height*0.5;
 let ty=base-(base-top)*grow;

 x.lineWidth=20;
 x.strokeStyle="#7a4a2a";
 x.beginPath();
 x.moveTo(cx,base);
 x.lineTo(cx,ty);
 x.stroke();

 branches.forEach((b,i)=>{
  let l=leaves[i];
  let p=getLeafPos(l,t);

  let ex=cx+(p.x-cx)*grow;
  let ey=ty+(p.y-ty)*grow;

  x.beginPath();
  x.lineWidth=b.w;
  x.moveTo(cx,ty);
  x.quadraticCurveTo(b.mx,b.my,ex,ey);
  x.stroke();
 });
}

// ✨ PARTICLES
function drawParticle(p){
 x.beginPath();
 x.arc(p.x,p.y,p.size,0,Math.PI*2);
 x.fillStyle="rgba(255,240,180,0.6)";
 x.fill();

 p.y-=p.speed;
 if(p.y<0){p.y=c.height;}
}

// 🎬 LOOP
function anim(t){
 bg();

 if(grow<1) grow+=0.01;

 tree(t);

 leaves.forEach(l=>{
  if(grow>0.6) drawLeaf(l,t);
 });

 particles.forEach(drawParticle);

 requestAnimationFrame(anim);
}

// TEXT
const msgs=[
 "Hey you 💕",
 "Happy Birthday 🎂",
 "You make everything brighter ✨",
 "Every moment with you matters 💖",
 "This little world is for you 🌸"
];

function showText(){
 const box=document.getElementById("box");

 msgs.forEach((m,i)=>{
  setTimeout(()=>{
   let d=document.createElement("div");
   d.textContent=m;
   box.appendChild(d);
  },i*2500);
 });

 setTimeout(()=>{
  finalBtn.style.opacity=1;
 }, msgs.length*2500+1500);
}

// FINAL
finalBtn.onclick=()=>{
 finalPhase=true;
 leaves=[];branches=[];

 let f=document.createElement("div");
 f.style.position="fixed";
 f.style.top="50%";
 f.style.left="50%";
 f.style.transform="translate(-50%,-50%)";
 f.style.fontSize="46px";
 f.style.color="white";
 f.innerHTML="Happy Birthday<br>Wewe 💕";
 document.body.appendChild(f);
};

// START
intro.onclick=()=>{
 intro.style.display="none";
 anim(0);
 showText();
};
</script>

</body>
</html>
