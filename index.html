<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

canvas {
  display: block;
}

/* 💬 Messages */
.message-box {
  position: absolute;
  right: 6%;
  top: 25%;
  width: 280px;
  font-size: 20px;
  line-height: 1.6;
}

.message {
  opacity: 0;
  margin-bottom: 10px;
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

// 🎨 Better aesthetic palette
const colors = [
  "#ff4d6d", "#ff758f", "#ff8fa3",
  "#ffb347", "#ffd166"
];

// ❤️ Heart formula
function heartShape(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

// 💖 Create dense but spaced leaves
for (let i = 0; i < 2800; i++) {
  let t = Math.random() * Math.PI * 2;
  let r = Math.random();

  let pos = heartShape(t);

  hearts.push({
    x: canvas.width * 0.35 + pos.x * 17 * r,
    y: canvas.height * 0.42 + pos.y * 17 * r,
    size: Math.random() * 4 + 4, // 🔥 more uniform = prettier
    color: colors[Math.floor(Math.random() * colors.length)],
    offset: Math.random() * 1000
  });
}

// 🌳 Clear visible trunk
function drawTrunk() {
  ctx.fillStyle = "#8b5e3c";
  ctx.fillRect(canvas.width * 0.345, canvas.height * 0.52, 22, 240);
}

// 🌿 Ground (garden base)
function drawGround() {
  ctx.fillStyle = "#1f3d2b";
  ctx.fillRect(0, canvas.height * 0.75, canvas.width, canvas.height * 0.25);
}

// 🧺 Simple picnic couple (minimal silhouette)
function drawPicnic() {
  let x = canvas.width * 0.32;
  let y = canvas.height * 0.75;

  // blanket
  ctx.fillStyle = "#ff8fa3";
  ctx.fillRect(x - 40, y + 10, 80, 10);

  // two heads
  ctx.beginPath();
  ctx.arc(x - 15, y, 6, 0, Math.PI * 2);
  ctx.arc(x + 15, y, 6, 0, Math.PI * 2);
  ctx.fillStyle = "#fff";
  ctx.fill();
}

// 💖 Crisp heart
function drawHeart(x, y, size, color) {
  ctx.beginPath();
  ctx.fillStyle = color;

  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x, y - size, x - size, y - size, x - size, y);
  ctx.bezierCurveTo(x - size, y + size, x, y + size * 1.6, x, y + size * 2);
  ctx.bezierCurveTo(x, y + size * 1.6, x + size, y + size, x + size, y);
  ctx.bezierCurveTo(x + size, y - size, x, y - size, x, y);

  ctx.closePath();
  ctx.fill();
}

// ✨ Smooth + visible vibration
function animate(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawGround();
  drawTrunk();
  drawPicnic();

  hearts.forEach(h => {
    let float = Math.sin(time * 0.002 + h.offset) * 2.5; // 🔥 better motion
    drawHeart(h.x, h.y + float, h.size, h.color);
  });

  requestAnimationFrame(animate);
}

animate();

// 💬 Messages stacking
const messages = [
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything brighter ✨",
  "I’m lucky to know you 💖",
  "This little world is for you 🌸"
];

const box = document.getElementById("messageBox");
let index = 0;

function addMessage() {
  if (index >= messages.length) return;

  const div = document.createElement("div");
  div.className = "message";
  div.textContent = messages[index];

  box.appendChild(div);
  index++;
}

setInterval(addMessage, 2500);

</script>

</body>
</html>
