<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>April ❤️</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#020204;
  font-family:'Segoe UI';
}

/* INTRO */
#intro {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:black;
  cursor:pointer;
  z-index:10;
}

.heart {
  width:90px;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  50% { transform:scale(1.15); }
}

/* TEXT */
.message-box{
 position:absolute;
 right:6%;
 top:28%;
 width:240px;
 color:#fff;
 font-size:15px;
 line-height:1.7;
 opacity:1;
 transition:opacity 1s ease;
}

/* BUTTON */
#finalBtn{
 position:absolute;
 left:6%;
 bottom:40px;
 padding:12px 18px;
 font-size:18px;
 border:none;
 border-radius:20px;
 background:rgba(255,100,150,0.25);
 color:white;
 backdrop-filter:blur(10px);
 cursor:pointer;
 opacity:0;
 transition:all 0.8s ease;
 z-index:5;
}

/* vignette */
body::after{
 content:"";
 position:fixed;
 inset:0;
 pointer-events:none;
 background:radial-gradient(circle, transparent 50%, rgba(0,0,0,0.65));
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" id="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>
<div class="message-box" id="box"></div>
<button id="finalBtn">💖</button>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let leaves=[],particles=[],branches=[];
let finalPhase=false;

// TREE GENERATION
function gen(){
  let cx=c.width/2,cy=c.height*0.45;

  for(let i=0;i<1300;i++){
    let t=Math.random()*Math.PI*2,r=Math.random();

    let px=16*Math.pow(Math.sin(t),3);
    let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let lx=cx+px*18*r,ly=cy+py*18*r;

    leaves.push({
      x:lx,y:ly,
      s:Math.random()*3+4,
      c:["#ff4d6d","#ff758f","#ff8fa3","#ffd1dc","#ffc2d1"][Math.floor(Math.random()*5)],
      p:Math.random()*1000
    });

    branches.push({
      ex:lx,ey:ly,
      mx:(cx+lx)/2+(Math.random()*20-10),
      my:(cy+ly)/2,
      w:0.5+Math.random()*0.4,
      alpha:0.35+Math.random()*0.2
    });
  }

  for(let i=0;i<150;i++){
    particles.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      size:Math.random()*4+1.5,
      speed:Math.random()*0.4+0.2,
      phase:Math.random()*1000,
      type:Math.random()<0.5?0:(Math.random()<0.8?1:2)
    });
  }
}
gen();

// MOUSE
let mouse={x:0,y:0};
addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// BACKGROUND
function bg(){
  let g=x.createRadialGradient(c.width/2,c.height/2,50,c.width/2,c.height/2,600);
  g.addColorStop(0,"#1a0a1f");
  g.addColorStop(1,"#020204");
  x.fillStyle=g;
  x.fillRect(0,0,c.width,c.height);
}

// HEART LEAF (WITH HOVER)
function drawLeaf(l,t){
  let float=Math.sin(t*0.002+l.p)*2;

  let dx=l.x-mouse.x;
  let dy=l.y-mouse.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  let xPos=l.x;
  let yPos=l.y+float;

  if(dist<120 && dist!==0){
    let force=(120-dist)*0.05;
    xPos+=dx/dist*force;
    yPos+=dy/dist*force;
  }

  x.beginPath();
  x.moveTo(xPos,yPos);
  x.bezierCurveTo(xPos,yPos-l.s,xPos-l.s,yPos-l.s,xPos-l.s,yPos);
  x.bezierCurveTo(xPos-l.s,yPos+l.s,xPos,yPos+l.s*1.5,xPos,yPos+l.s*2);
  x.bezierCurveTo(xPos,yPos+l.s*1.5,xPos+l.s,yPos+l.s,xPos+l.s,yPos);
  x.bezierCurveTo(xPos+l.s,yPos-l.s,xPos,yPos-l.s,xPos,yPos);

  x.fillStyle=l.c;
  x.shadowBlur=10;
  x.shadowColor=l.c;
  x.fill();
  x.shadowBlur=0;
}

// PARTICLES (unchanged)
function drawParticle(p,t){
  let dx=p.x-mouse.x;
  let dy=p.y-mouse.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<100 && dist!==0){
    let f=(100-dist)*0.02;
    p.x+=dx/dist*f;
    p.y+=dy/dist*f;
  }

  if(p.type===0){
    let pulse=Math.sin(t*0.004+p.phase)*0.5+0.5;
    let s=p.size*(1+pulse*0.5);

    x.beginPath();
    x.moveTo(p.x, p.y - s);
    for(let i=1;i<5;i++){
      let a=i*Math.PI*2/5;
      let r=i%2===0?s:s*0.4;
      x.lineTo(p.x+Math.sin(a)*r, p.y-Math.cos(a)*r);
    }
    x.closePath();
    x.fillStyle="rgba(255,230,140,0.9)";
    x.shadowBlur=20;
    x.shadowColor="#ffd166";
    x.fill();
    x.shadowBlur=0;
  } else if(p.type===1){
    let s=p.size*1.3;
    x.strokeStyle="rgba(255,255,255,0.85)";
    x.lineWidth=1;
    x.beginPath();
    for(let i=0;i<6;i++){
      let a=i*Math.PI/3;
      x.moveTo(p.x,p.y);
      x.lineTo(p.x+Math.cos(a)*s,p.y+Math.sin(a)*s);
    }
    x.stroke();
  } else {
    let pulse=Math.sin(t*0.002+p.phase)*0.5+0.5;
    x.beginPath();
    x.arc(p.x,p.y,p.size*(0.8+pulse*0.5),0,Math.PI*2);
    x.fillStyle="rgba(255,240,180,0.5)";
    x.shadowBlur=30;
    x.shadowColor="#ffd166";
    x.fill();
    x.shadowBlur=0;
  }

  p.y-=p.speed;
  p.x+=Math.sin(t*0.001+p.phase)*0.25;

  if(p.y<0){
    p.y=c.height;
    p.x=Math.random()*c.width;
  }
}

// 🌬️ FIXED WIND (NON-DESTRUCTIVE)
let wind = { angle: Math.PI/6, strength: 0.3 };

const originalDrawLeaf2 = drawLeaf;

drawLeaf = function(l,t){
  let wx = Math.cos(wind.angle) * wind.strength * 2;
  let wy = Math.sin(wind.angle) * wind.strength * 1;

  let ox = l.x;
  let oy = l.y;

  l.x = ox + wx;
  l.y = oy + wy;

  originalDrawLeaf2(l,t);

  l.x = ox;
  l.y = oy;
};

// ANIMATION
let grow=0;
function anim(t){
  bg();

  if(grow<1) grow+=0.01;

  let cx=c.width/2,base=c.height*0.8,top=c.height*0.5;
  let ty=base-(base-top)*grow;

  x.lineWidth=22;
  x.strokeStyle="#7a4a2a";
  x.beginPath();
  x.moveTo(cx,base);
  x.lineTo(cx,ty);
  x.stroke();

  branches.forEach(b=>{
    let ex=cx+(b.ex-cx)*grow;
    let ey=ty+(b.ey-ty)*grow;

    x.beginPath();
    x.lineWidth=b.w;
    x.strokeStyle="rgba(200,140,90,0.5)";
    x.moveTo(cx,ty);
    x.quadraticCurveTo(b.mx,b.my,ex,ey);
    x.stroke();
  });

  leaves.forEach(l=>{
    if(grow>0.6) drawLeaf(l,t);
  });

  particles.forEach(p=>drawParticle(p,t));

  requestAnimationFrame(anim);
}

// INTRO
document.getElementById("intro").onclick=()=>{
  intro.style.opacity=0;
  setTimeout(()=>{
    intro.style.display="none";
    anim(0);
  },1200);
};
</script>

</body>
</html>
