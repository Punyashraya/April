<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Magical Tree ✨</title>

<style>
body {margin:0;overflow:hidden;background:#020204;}

#intro {
 position:fixed; inset:0;
 display:flex; justify-content:center; align-items:center;
 background:black; cursor:pointer;
 transition:1.5s;
}

.heart {width:90px; animation:pulse 1.6s infinite;}
@keyframes pulse {50%{transform:scale(1.15);}}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let leaves=[],particles=[],branches=[];

function gen(){
  let cx=c.width/2,cy=c.height*0.45;

  for(let i=0;i<1400;i++){
    let t=Math.random()*Math.PI*2,r=Math.random();
    let px=16*Math.pow(Math.sin(t),3);
    let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let lx=cx+px*18*r,ly=cy+py*18*r;

    leaves.push({
      x:lx,y:ly,
      s:Math.random()*3+4,
      c:["#ff4d6d","#ff8fa3","#ffd1dc"][Math.floor(Math.random()*3)],
      p:Math.random()*1000
    });

    branches.push({
      ex:lx,ey:ly,
      cx:cx+(lx-cx)*0.5,
      cy:cy+(ly-cy)*0.5
    });
  }

  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      s:Math.random()*2,
      sp:Math.random()*0.5+0.2
    });
  }
}
gen();

function bg(){
  let g=x.createRadialGradient(c.width/2,c.height/2,50,c.width/2,c.height/2,600);
  g.addColorStop(0,"#1a0a1f");
  g.addColorStop(1,"#020204");
  x.fillStyle=g;
  x.fillRect(0,0,c.width,c.height);
}

function heart(px,py,s,col){
  x.beginPath();
  x.moveTo(px,py);
  x.bezierCurveTo(px,py-s,px-s,py-s,px-s,py);
  x.bezierCurveTo(px-s,py+s,px,py+s*1.5,px,py+s*2);
  x.bezierCurveTo(px,py+s*1.5,px+s,py+s,px+s,py);
  x.bezierCurveTo(px+s,py-s,px,py-s,px,py);
  x.fillStyle=col;
  x.shadowBlur=10;
  x.shadowColor=col;
  x.fill();
  x.shadowBlur=0;
}

let grow=0,started=false;

function tree(){
  let cx=c.width/2,base=c.height*0.8,top=c.height*0.5;
  let ty=base-(base-top)*grow;

  x.lineWidth=16;
  x.strokeStyle="#ff9a6a";
  x.beginPath();x.moveTo(cx,base);x.lineTo(cx,ty);x.stroke();

  x.lineWidth=1;
  x.strokeStyle="rgba(255,150,100,0.4)";

  branches.forEach(b=>{
    x.beginPath();
    x.moveTo(cx,ty);
    x.quadraticCurveTo(b.cx,b.cy,cx+(b.ex-cx)*grow,ty+(b.ey-ty)*grow);
    x.stroke();
  });
}

function anim(t){
  if(!started) return;

  bg();
  if(grow<1) grow+=0.01;

  tree();

  leaves.forEach(l=>{
    if(grow>0.6){
      heart(l.x,l.y+Math.sin(t*0.002+l.p)*2,l.s,l.c);
    }
  });

  particles.forEach(p=>{
    x.beginPath();
    x.arc(p.x,p.y,p.s,0,Math.PI*2);
    x.fillStyle="rgba(255,200,200,0.4)";
    x.fill();
    p.y-=p.sp;
    if(p.y<0){p.y=c.height;p.x=Math.random()*c.width;}
  });

  requestAnimationFrame(anim);
}

document.getElementById("intro").onclick=()=>{
  intro.style.opacity=0;
  setTimeout(()=>{
    intro.style.display="none";
    started=true;
    anim(0);
  },1200);
};
</script>

</body>
</html>
