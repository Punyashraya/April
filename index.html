<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Realistic Tree ❤️</title>

<style>
body { margin:0; overflow:hidden; background:#050505; }

#intro {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:#050505; cursor:pointer;
  transition:1.5s;
}

.heart { width:90px; animation:pulse 1.6s infinite; }

@keyframes pulse {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.12);}
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");

function resize(){
  c.width=innerWidth; c.height=innerHeight;
}
resize(); addEventListener("resize",resize);

let leaves=[],branches=[];
function gen(){
  leaves=[]; branches=[];
  let cx=c.width/2, cy=c.height*0.45;

  for(let i=0;i<1200;i++){
    let t=Math.random()*Math.PI*2, r=Math.random();
    let px=16*Math.pow(Math.sin(t),3);
    let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let lx=cx+px*18*r, ly=cy+py*18*r;

    leaves.push({
      x:lx,y:ly,
      s:Math.random()*3+4,
      c:["#ff4d6d","#ff758f","#ff8fa3","#ffc2d1"][Math.floor(Math.random()*4)],
      p:Math.random()*1000
    });

    branches.push({
      ex:lx, ey:ly,
      cx:cx+(lx-cx)*0.5+(Math.random()*20-10),
      cy:cy+(ly-cy)*0.5
    });
  }
}
gen();

let mouse={x:0,y:0};
addEventListener("mousemove",e=>{
  mouse.x=e.clientX; mouse.y=e.clientY;
});

function heart(xp,yp,s,col){
  x.beginPath();
  x.moveTo(xp,yp);
  x.bezierCurveTo(xp,yp-s,xp-s,yp-s,xp-s,yp);
  x.bezierCurveTo(xp-s,yp+s,xp,yp+s*1.5,xp,yp+s*2);
  x.bezierCurveTo(xp,yp+s*1.5,xp+s,yp+s,xp+s,yp);
  x.bezierCurveTo(xp+s,yp-s,xp,yp-s,xp,yp);
  x.fillStyle=col;
  x.fill();
}

let grow=0,started=false;

function drawTree(){
  let cx=c.width/2, base=c.height*0.8, top=c.height*0.5;
  let ty=base-(base-top)*grow;

  x.lineWidth=18;
  x.strokeStyle="#8b5e3c";
  x.beginPath(); x.moveTo(cx,base); x.lineTo(cx,ty); x.stroke();

  x.lineWidth=1;
  x.strokeStyle="rgba(150,90,40,0.5)";

  branches.forEach(b=>{
    x.beginPath();
    x.moveTo(cx,ty);

    let ex=cx+(b.ex-cx)*grow;
    let ey=ty+(b.ey-ty)*grow;

    x.quadraticCurveTo(b.cx,b.cy,ex,ey);
    x.stroke();
  });
}

function drawBg(){
  let g=x.createRadialGradient(c.width/2,c.height/2,50,c.width/2,c.height/2,600);
  g.addColorStop(0,"#111");
  g.addColorStop(1,"#050505");
  x.fillStyle=g;
  x.fillRect(0,0,c.width,c.height);
}

function anim(t){
  if(!started) return;

  drawBg();

  if(grow<1) grow+=0.01;

  drawTree();

  leaves.forEach(l=>{
    if(grow>0.6){
      let fx=l.x, fy=l.y+Math.sin(t*0.002+l.p)*2;

      let dx=fx-mouse.x, dy=fy-mouse.y;
      let d=Math.sqrt(dx*dx+dy*dy);

      if(d<100 && d!==0){
        fx+=dx/d*(100-d)*0.05;
        fy+=dy/d*(100-d)*0.05;
      }

      heart(fx,fy,l.s,l.c);
    }
  });

  requestAnimationFrame(anim);
}

document.getElementById("intro").onclick=()=>{
  intro.style.opacity=0;
  setTimeout(()=>{
    intro.style.display="none";
    started=true;
    anim(0);
  },1200);
};
</script>

</body>
</html>
