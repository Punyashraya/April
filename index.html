<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

canvas {
  display: block;
}

/* 💬 Messages */
.message-box {
  position: absolute;
  right: 6%;
  top: 30%;
  width: 280px;
  font-size: 20px;
  line-height: 1.6;
}

.message {
  opacity: 0;
  margin-bottom: 10px;
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

// 🍁 Soft aesthetic palette
const colors = [
  "#ff8fa3", "#ff758f", "#ffb3c1",
  "#ffd166", "#f4a261", "#ff6b6b"
];

// ❤️ Heart shape formula
function heartShape(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

// 💖 CREATE DENSE TREE (MAIN FOCUS)
for (let i = 0; i < 3500; i++) {
  let t = Math.random() * Math.PI * 2;
  let r = Math.random();

  let pos = heartShape(t);

  hearts.push({
    x: canvas.width * 0.35 + pos.x * 18 * r,
    y: canvas.height * 0.45 + pos.y * 18 * r,
    size: Math.random() * 5 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    offset: Math.random() * 1000
  });
}

// 🌳 Subtle trunk (thin & soft)
function drawTrunk() {
  ctx.fillStyle = "#e5a5a5";
  ctx.fillRect(canvas.width * 0.345, canvas.height * 0.55, 18, 220);
}

// 💖 Draw heart leaf
function drawHeart(x, y, size, color) {
  ctx.beginPath();
  ctx.fillStyle = color;

  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x, y - size, x - size, y - size, x - size, y);
  ctx.bezierCurveTo(x - size, y + size, x, y + size * 1.5, x, y + size * 2);
  ctx.bezierCurveTo(x, y + size * 1.5, x + size, y + size, x + size, y);
  ctx.bezierCurveTo(x + size, y - size, x, y - size, x, y);

  ctx.fill();
}

// ✨ Smooth animation (VERY subtle)
function animate(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawTrunk();

  hearts.forEach(h => {
    let float = Math.sin(time * 0.001 + h.offset) * 1.5; // 🔥 slower + softer
    drawHeart(h.x, h.y + float, h.size, h.color);
  });

  requestAnimationFrame(animate);
}

animate();

// 💬 Messages stacking
const messages = [
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything better ✨",
  "Stay amazing always 💖",
  "This is just for you 🌸"
];

const box = document.getElementById("messageBox");
let index = 0;

function addMessage() {
  if (index >= messages.length) return;

  const div = document.createElement("div");
  div.className = "message";
  div.textContent = messages[index];

  box.appendChild(div);
  index++;
}

setInterval(addMessage, 2500);
</script>

</body>
</html>
