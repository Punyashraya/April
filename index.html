<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

canvas {
  display: block;
}

/* 💬 Messages */
.message-box {
  position: absolute;
  right: 5%;
  top: 25%;
  width: 300px;
  font-size: 20px;
  line-height: 1.6;
}

.message {
  opacity: 0;
  margin-bottom: 10px;
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🍁 Autumn/Spring palette
const colors = [
  "#ff4d6d", "#ff758f", "#ff8fa3",
  "#ffb347", "#ffd166", "#f77f00",
  "#e63946", "#f4a261"
];

// 🌳 Draw trunk + branches (recursive)
function drawBranch(x, y, length, angle, depth) {
  if (depth === 0) return;

  const x2 = x + length * Math.cos(angle);
  const y2 = y - length * Math.sin(angle);

  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = "#d8a48f";
  ctx.lineWidth = depth * 2;
  ctx.stroke();

  // Add leaves near branch tips
  if (depth < 4) {
    for (let i = 0; i < 15; i++) {
      drawHeart(
        x2 + Math.random() * 20 - 10,
        y2 + Math.random() * 20 - 10,
        Math.random() * 5 + 3,
        colors[Math.floor(Math.random() * colors.length)]
      );
    }
  }

  // Split branches
  drawBranch(x2, y2, length * 0.7, angle - 0.5, depth - 1);
  drawBranch(x2, y2, length * 0.7, angle + 0.5, depth - 1);
}

// 💖 Draw heart leaf
function drawHeart(x, y, size, color) {
  ctx.beginPath();
  ctx.fillStyle = color;

  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x, y - size, x - size, y - size, x - size, y);
  ctx.bezierCurveTo(x - size, y + size, x, y + size * 1.5, x, y + size * 2);
  ctx.bezierCurveTo(x, y + size * 1.5, x + size, y + size, x + size, y);
  ctx.bezierCurveTo(x + size, y - size, x, y - size, x, y);

  ctx.fill();
}

// ✨ Animate tree sway
function animate(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let sway = Math.sin(time * 0.001) * 0.1;

  drawBranch(
    canvas.width * 0.35,
    canvas.height * 0.8,
    120,
    Math.PI / 2 + sway,
    7
  );

  requestAnimationFrame(animate);
}

animate();

// 💬 Messages stacking
const messages = [
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make the world brighter ✨",
  "Stay as lovely as you are 💖",
  "This tree blooms just for you 🌸"
];

const box = document.getElementById("messageBox");
let index = 0;

function addMessage() {
  if (index >= messages.length) return;

  const div = document.createElement("div");
  div.className = "message";
  div.textContent = messages[index];

  box.appendChild(div);
  index++;
}

setInterval(addMessage, 2000);
</script>

</body>
</html>
