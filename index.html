<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #050505;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌑 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #050505;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
}

/* 💓 Neon outline heart */
.heart {
  width: 80px;
  height: 80px;
  position: relative;
  transform: rotate(45deg);
  animation: pulse 1.6s infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 80px;
  height: 80px;
  border: 2px solid #ff2e88;
  border-radius: 50%;
  box-shadow: 0 0 15px #ff2e88, 0 0 30px #ff2e88;
}

.heart::before { top: -40px; left: 0; }
.heart::after { left: -40px; top: 0; }

@keyframes pulse {
  0%,100% { transform: scale(1) rotate(45deg); }
  50% { transform: scale(1.15) rotate(45deg); }
}

/* 💌 TEXT */
.message-box {
  position: absolute;
  right: 6%;
  top: 35%;
  width: 260px;
  color: #f1f1f1;
  font-size: 18px;
  line-height: 1.8;
  letter-spacing: 0.5px;
}

.message {
  opacity: 0;
  transform: translateY(20px);
  filter: blur(6px);
  transition: all 1.8s ease;
  margin-bottom: 12px;
  text-shadow: 0 0 8px rgba(255,100,150,0.3);
}
</style>
</head>

<body>

<div id="intro">
  <div class="heart" id="introHeart"></div>
</div>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const centerX = () => canvas.width/2;
const groundY = () => canvas.height*0.75;

// 🌌 dark background
function drawBackground(){
  ctx.fillStyle = "#050505";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 💖 tree
const colors = ["#ff4d6d","#ff758f","#ff8fa3"];
let hearts=[];

function generateTree(){
  hearts=[];
  for(let i=0;i<2400;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    hearts.push({
      x:centerX()+x*20*r,
      y:canvas.height*0.45 + y*20*r,
      size:Math.random()*3+5,
      color:colors[Math.floor(Math.random()*colors.length)],
      phase:Math.random()*1000
    });
  }
}
generateTree();

// 🌳 trunk grow animation
let growth = 0;

// 🌳 trunk
function drawTrunk(){
  let x=centerX();
  let base=groundY();
  let top=base - 250*growth;

  ctx.beginPath();
  ctx.moveTo(x-25,base);
  ctx.bezierCurveTo(x-50,base-100, x-20,top, x-10,top);
  ctx.lineTo(x+10,top);
  ctx.bezierCurveTo(x+20,top, x+50,base-100, x+25,base);
  ctx.fillStyle="#6b3e26";
  ctx.fill();
}

// ❤️ heart leaf
function drawHeart(x,y,size,color){
  ctx.beginPath();
  ctx.fillStyle=color;

  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
  ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
  ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
  ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);

  ctx.fill();
}

// 💓 falling heart
let heartY = canvas.height/2;
let dropping = false;

// 🎬 animation
function animate(time){
  drawBackground();

  if(dropping){
    heartY += 8;

    ctx.strokeStyle="#ff2e88";
    ctx.lineWidth=2;
    ctx.shadowBlur=15;
    ctx.shadowColor="#ff2e88";

    ctx.beginPath();
    ctx.arc(centerX(), heartY, 20, 0, Math.PI*2);
    ctx.stroke();

    if(heartY > groundY()){
      dropping=false;
    }
  }

  if(!dropping && growth < 1){
    growth += 0.02;
  }

  if(growth > 0){
    drawTrunk();

    hearts.forEach(h=>{
      let float=Math.sin(time*0.002+h.phase)*2;
      drawHeart(h.x, h.y*growth + (1-growth)*groundY(), h.size, h.color);
    });
  }

  requestAnimationFrame(animate);
}

// 💌 messages
const messages=[
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You mean more than you know ✨",
  "Every moment feels special with you 💖",
  "This little world is yours 🌸"
];

function showMessages(){
  const box=document.getElementById("messageBox");

  messages.forEach((msg,i)=>{
    setTimeout(()=>{
      const div=document.createElement("div");
      div.className="message";
      div.textContent=msg;
      box.appendChild(div);

      setTimeout(()=>{
        div.style.opacity=1;
        div.style.transform="translateY(0)";
        div.style.filter="blur(0)";
      },100);

    }, i*3000);
  });
}

// 🌑 click intro
document.getElementById("intro").onclick=()=>{
  document.getElementById("intro").style.display="none";
  dropping = true;
  animate(0);

  setTimeout(()=>{
    showMessages();
  },4000);
};
</script>

</body>
</html>
