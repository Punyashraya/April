<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;

  /* 🌅 ALWAYS visible background */
  background: linear-gradient(to top, #1a1a2e 0%, #3a0ca3 40%, #ff758f 100%);
}

/* 🎥 video (optional enhancement) */
#bgVideo {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 2s ease;
  z-index: -2;
}

#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  z-index: -1;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* 💌 messages */
.message-box {
  position: absolute;
  right: 5%;
  top: 25%;
  width: 320px;
  font-size: 22px;
  color: white;
}

.message {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1s ease;
  margin-bottom: 12px;
}
</style>
</head>

<body>

<video id="bgVideo" autoplay loop muted playsinline>
  <source src="sunset_picnic.mp4" type="video/mp4">
</video>

<div id="overlay"></div>
<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const video = document.getElementById("bgVideo");

// 🎥 show video if available
video.addEventListener("canplay", () => {
  video.style.opacity = 1;
});

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// 🌳 original-style heart cloud
const colors = ["#ff4d6d","#ff758f","#ff8fa3","#ffd166","#f4a261"];
let hearts = [];
let branches = [];

function generateTree(){
  hearts = [];
  branches = [];

  for (let i = 0; i < 1800; i++) {
    let t = Math.random() * Math.PI * 2;
    let r = Math.random();

    let x = 16*Math.pow(Math.sin(t),3);
    let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let hx = canvas.width*0.5 + x*18*r;
    let hy = canvas.height*0.42 + y*18*r;

    hearts.push({
      x: hx,
      y: hy,
      size: Math.random()*3 + 5,
      color: colors[Math.floor(Math.random()*colors.length)],
      phase: Math.random()*1000
    });

    // 🌿 create STATIC branch once
    let trunkTop = {
      x: canvas.width*0.5,
      y: canvas.height*0.55
    };

    branches.push({
      startX: trunkTop.x,
      startY: trunkTop.y,
      endX: hx,
      endY: hy,
      midX: (trunkTop.x + hx)/2 + (Math.random()*40-20),
      midY: (trunkTop.y + hy)/2
    });
  }
}
generateTree();

// 🖱️ mouse interaction
let mouse = {x:0,y:0};
window.addEventListener("mousemove", e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

// 🌳 aesthetic trunk
function drawTrunk(){
  let x = canvas.width*0.5;
  let y = canvas.height*0.75;

  ctx.beginPath();
  ctx.moveTo(x-8, y);
  ctx.quadraticCurveTo(x-15, y-100, x-5, y-160);
  ctx.lineTo(x+5, y-160);
  ctx.quadraticCurveTo(x+15, y-100, x+8, y);
  ctx.closePath();

  ctx.fillStyle = "#5a3825";
  ctx.fill();
}

// 🌿 STATIC branches
function drawBranches(){
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = 0.6;

  branches.forEach(b=>{
    ctx.beginPath();
    ctx.moveTo(b.startX, b.startY);
    ctx.quadraticCurveTo(b.midX, b.midY, b.endX, b.endY);
    ctx.stroke();
  });
}

// ❤️ heart
function drawHeart(x,y,size,color){
  ctx.beginPath();
  ctx.fillStyle=color;

  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
  ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
  ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
  ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);

  ctx.fill();
}

// ✨ animation
function animate(time){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawTrunk();
  drawBranches();

  hearts.forEach(h=>{
    let float = Math.sin(time*0.002 + h.phase)*2;

    let dx = h.x - mouse.x;
    let dy = h.y - mouse.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let push = dist<100 ? (100-dist)/5 : 0;

    let x = h.x + (dx/dist)*push || h.x;
    let y = h.y + float + (dy/dist)*push || h.y;

    drawHeart(x,y,h.size,h.color);
  });

  requestAnimationFrame(animate);
}
animate(0);

// 💌 messages
const messages=[
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make my world brighter ✨",
  "Every moment with you matters 💖",
  "This world is just for you 🌸"
];

const box=document.getElementById("messageBox");

messages.forEach((msg,i)=>{
  setTimeout(()=>{
    const div=document.createElement("div");
    div.className="message";
    div.textContent=msg;

    box.appendChild(div);

    setTimeout(()=>{
      div.style.opacity=1;
      div.style.transform="translateY(0)";
    },100);

  }, i*2500);
});

// ❤️ ending
setTimeout(()=>{
  const final=document.createElement("div");
  final.textContent="I love you ❤️";
  final.style.fontSize="32px";
  final.style.opacity=0;
  final.style.transition="2s";

  box.appendChild(final);
  setTimeout(()=>final.style.opacity=1,200);

},15000);

</script>

</body>
</html>
