<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #050505;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌑 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #050505;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

/* 💓 HEART */
.heart {
  width: 100px;
  height: 100px;
  cursor: pointer;
  animation: pulse 1.5s infinite;
}

.heart path {
  fill: #5a0f2e;
  stroke: #ff2e88;
  stroke-width: 2.5;
  filter: drop-shadow(0 0 10px #ff2e88)
          drop-shadow(0 0 25px #ff2e88);
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* 💌 TEXT */
.message-box {
  position: absolute;
  right: 6%;
  top: 30%;
  width: 260px;
  color: white;
  font-size: 18px;
  line-height: 1.7;
}

.message {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.5s ease;
  margin-bottom: 12px;
  text-shadow: 0 0 8px rgba(255,100,150,0.3);
}
</style>
</head>

<body>

<div id="intro">
  <svg class="heart" viewBox="0 0 100 100">
    <path d="M50 90 
             L20 60 
             A20 20 0 1 1 50 30 
             A20 20 0 1 1 80 60 
             Z"/>
  </svg>
</div>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const centerX = () => canvas.width/2;
const centerY = () => canvas.height/2;

// 🌌 background
function drawBackground(){
  ctx.fillStyle="#050505";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 💥 PARTICLES (heart dissolve)
let particles=[];
let exploding=false;

function createExplosion(){
  particles=[];
  for(let i=0;i<200;i++){
    particles.push({
      x:centerX(),
      y:centerY(),
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      life:100
    });
  }
}

// 🌳 TREE
let hearts=[];
let branches=[];
let growth=0;

function generateTree(){
  hearts=[];
  branches=[];

  let trunkTop={x:centerX(),y:canvas.height*0.5};

  for(let i=0;i<1200;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let hx=centerX()+x*18*r;
    let hy=canvas.height*0.45+y*18*r;

    hearts.push({
      x:hx,
      y:hy,
      size:Math.random()*3+5,
      phase:Math.random()*1000
    });

    branches.push({
      sx:trunkTop.x,
      sy:trunkTop.y,
      ex:hx,
      ey:hy
    });
  }
}
generateTree();

// 🌳 trunk
function drawTrunk(){
  let x=centerX();
  let y=canvas.height*0.75;

  ctx.beginPath();
  ctx.moveTo(x-25,y);
  ctx.bezierCurveTo(x-40,y-100, x-15,y-200, x-10,y-250);
  ctx.lineTo(x+10,y-250);
  ctx.bezierCurveTo(x+15,y-200, x+40,y-100, x+25,y);
  ctx.fillStyle="#6b3e26";
  ctx.fill();
}

// ❤️ heart
function drawHeart(x,y,size){
  ctx.beginPath();
  ctx.fillStyle="#ff4d6d";

  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
  ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
  ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
  ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);

  ctx.fill();
}

// 🎬 animation
let stage="intro";

function animate(time){
  drawBackground();

  // 💥 explosion
  if(stage==="explode"){
    particles.forEach(p=>{
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=0.05;
      p.life--;

      ctx.fillStyle="rgba(255,100,150,0.7)";
      ctx.fillRect(p.x,p.y,3,3);
    });

    particles=particles.filter(p=>p.life>0);

    if(particles.length===0){
      stage="grow";
    }
  }

  // 🌱 grow tree
  if(stage==="grow"){
    growth+=0.02;
    drawTrunk();

    hearts.forEach(h=>{
      let y = h.y*growth + (1-growth)*canvas.height;
      drawHeart(h.x,y,h.size);
    });

    if(growth>=1){
      stage="final";
      showMessages();
    }
  }

  // 🌳 final
  if(stage==="final"){
    drawTrunk();
    hearts.forEach(h=>{
      let float=Math.sin(time*0.002+h.phase)*2;
      drawHeart(h.x,h.y+float,h.size);
    });
  }

  requestAnimationFrame(animate);
}

// 💌 messages
const messages=[
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything brighter ✨",
  "Every moment with you matters 💖",
  "This little world is for you 🌸"
];

function showMessages(){
  const box=document.getElementById("messageBox");

  messages.forEach((msg,i)=>{
    setTimeout(()=>{
      const div=document.createElement("div");
      div.className="message";
      div.textContent=msg;
      box.appendChild(div);

      setTimeout(()=>{
        div.style.opacity=1;
        div.style.transform="translateY(0)";
      },100);

    }, i*2500);
  });
}

// 💓 click
document.querySelector(".heart").onclick=()=>{
  document.getElementById("intro").style.display="none";

  stage="explode";
  createExplosion();
  animate(0);
};
</script>

</body>
</html>
