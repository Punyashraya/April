<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #050505;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌑 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #050505;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  transition: opacity 1.5s ease;
}

.heart {
  width: 90px;
  animation: pulse 1.6s infinite;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* 💌 TEXT */
.message-box {
  position: absolute;
  right: 6%;
  top: 30%;
  width: 240px;
  color: white;
  font-size: 16px;
  line-height: 1.6;
}

.message {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.5s ease;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="intro">
  <svg class="heart" viewBox="0 0 100 100">
    <path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
          fill="#4a0f2a"
          stroke="#ff2e88"
          stroke-width="2.5"/>
  </svg>
</div>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const centerX = () => canvas.width/2;
const centerY = () => canvas.height*0.45;

// 🌌 BACKGROUND
function drawBackground(){
  let g = ctx.createRadialGradient(centerX(), centerY(), 50, centerX(), centerY(), 500);
  g.addColorStop(0,"#111");
  g.addColorStop(1,"#050505");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 🌳 TREE DATA
let leaves=[];
let growProgress = 0;

function generateTree(){
  leaves=[];
  
  let count = window.innerWidth < 600 ? 900 : 1500;

  for(let i=0;i<count;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    leaves.push({
      x:centerX()+x*18*r,
      y:centerY()+y*18*r,
      size:Math.random()*3+4,
      color:["#ff4d6d","#ff758f","#ff8fa3"][Math.floor(Math.random()*3)],
      phase:Math.random()*1000,
      rot:Math.random()*Math.PI
    });
  }
}
generateTree();

// 🌳 TRUNK + BRANCHES
function drawTreeStructure(){
  let x=centerX();
  let y=canvas.height*0.8;

  ctx.lineWidth = 8;
  ctx.strokeStyle = "#6b3e26";

  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x,y-200*growProgress);
  ctx.stroke();

  // branches
  for(let i=0;i<20;i++){
    let angle = (Math.random()*Math.PI/2 - Math.PI/4);
    let len = 100 + Math.random()*80;

    ctx.beginPath();
    ctx.moveTo(x,y-200*growProgress);

    ctx.quadraticCurveTo(
      x + Math.cos(angle)*len*0.5,
      y-200*growProgress - 50,
      x + Math.cos(angle)*len,
      y-200*growProgress - len
    );

    ctx.stroke();
  }
}

// ❤️ HEART LEAF
function drawHeart(x,y,size,color,rot){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot);

  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(0,-size,-size,-size,-size,0);
  ctx.bezierCurveTo(-size,size,0,size*1.5,0,size*2);
  ctx.bezierCurveTo(0,size*1.5,size,size,size,0);
  ctx.bezierCurveTo(size,-size,0,-size,0,0);

  ctx.fillStyle=color;
  ctx.shadowBlur=10;
  ctx.shadowColor=color;
  ctx.fill();

  ctx.restore();
}

// ✨ ANIMATION
let started=false;

function animate(time){
  if(!started) return;

  drawBackground();

  // grow tree
  if(growProgress < 1){
    growProgress += 0.01;
  }

  drawTreeStructure();

  // leaves appear gradually
  leaves.forEach(l=>{
    if(Math.random() < growProgress){
      let float = Math.sin(time*0.002+l.phase)*2;
      drawHeart(l.x,l.y+float,l.size,l.color,l.rot);
    }
  });

  requestAnimationFrame(animate);
}

// 💌 TEXT
const messages=[
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything brighter ✨",
  "Every moment with you matters 💖",
  "This little world is for you 🌸"
];

function showMessages(){
  const box=document.getElementById("messageBox");

  messages.forEach((msg,i)=>{
    setTimeout(()=>{
      const div=document.createElement("div");
      div.className="message";
      div.textContent=msg;
      box.appendChild(div);

      setTimeout(()=>{
        div.style.opacity=1;
        div.style.transform="translateY(0)";
      },100);

    }, i*2500);
  });
}

// 🎬 TRANSITION (UPGRADED)
document.getElementById("intro").onclick=()=>{
  const intro=document.getElementById("intro");

  // heart shrink effect
  intro.style.transform="scale(0.8)";
  intro.style.opacity=0;

  setTimeout(()=>{
    intro.style.display="none";
    started=true;
    animate(0);
    showMessages();
  },1200);
};
</script>

</body>
</html>
