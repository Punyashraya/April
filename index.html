<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>April ❤️</title>

<style>
body{margin:0;overflow:hidden;background:#020204;font-family:'Segoe UI';}

/* INTRO */
#intro{
 position:fixed;inset:0;
 display:flex;justify-content:center;align-items:center;
 background:black;cursor:pointer;z-index:10;
}

.heart{width:90px;animation:pulse 1.6s infinite;}
@keyframes pulse{50%{transform:scale(1.15);}}

/* TEXT */
.message-box{
 position:absolute;right:6%;top:28%;
 width:240px;color:#fff;font-size:15px;line-height:1.7;
 transition:opacity 1s ease;
}

/* BUTTON */
#finalBtn{
 position:absolute;left:6%;bottom:40px;
 padding:12px 18px;font-size:18px;
 border:none;border-radius:20px;
 background:rgba(255,100,150,0.25);
 color:white;backdrop-filter:blur(10px);
 cursor:pointer;opacity:0;
 transition:all 0.8s ease;
}

/* vignette */
body::after{
 content:"";position:fixed;inset:0;pointer-events:none;
 background:radial-gradient(circle, transparent 50%, rgba(0,0,0,0.65));
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>
<div class="message-box" id="box"></div>
<button id="finalBtn">💖</button>

<script>
// ===============================
// SETUP
// ===============================
const c=document.getElementById("c");
const ctx=c.getContext("2d");
const box=document.getElementById("box");
const btn=document.getElementById("finalBtn");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

// ===============================
// STATE
// ===============================
let leaves=[],particles=[],branches=[];
let mouse={x:0,y:0};
let grow=0,finalPhase=false;
let beatPulse=0,beatGlow=0,beatTimer=0;

// ===============================
// AUDIO
// ===============================
const music=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3");
const heartbeat=new Audio("https://cdn.pixabay.com/download/audio/2022/03/10/audio_3d2b9f7c1a.mp3");

music.loop=true;
music.volume=0.4;
heartbeat.volume=0.25;

function startAudio(){
  music.play().catch(()=>{});
}

function playBeat(){
  heartbeat.currentTime=0;
  heartbeat.play().catch(()=>{});
  beatPulse=1;
  beatGlow=1;
}

addEventListener("click",startAudio,{once:true});

// ===============================
// TREE GENERATION (ANCHOR SAFE)
// ===============================
function gen(){
 let cx=c.width/2,cy=c.height*0.45;

 for(let i=0;i<1200;i++){
  let t=Math.random()*Math.PI*2,r=Math.random();
  let px=16*Math.pow(Math.sin(t),3);
  let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

  let x=cx+px*18*r,y=cy+py*18*r;

  leaves.push({
    baseX:x,
    baseY:y,
    s:Math.random()*3+4,
    c:["#ff4d6d","#ff758f","#ff8fa3","#ffd1dc","#ffc2d1"][Math.floor(Math.random()*5)],
    p:Math.random()*1000
  });

  branches.push({
    ex:x,ey:y,
    mx:(cx+x)/2+(Math.random()*20-10),
    my:(cy+y)/2,
    w:0.6
  });
 }

 for(let i=0;i<140;i++){
  particles.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    base:Math.random()*4+1.5,
    speed:Math.random()*0.4+0.2,
    phase:Math.random()*1000,
    type:Math.random()<0.5?0:(Math.random()<0.8?1:2)
  });
 }
}
gen();

// ===============================
// INPUT
// ===============================
addEventListener("mousemove",e=>{
 mouse.x=e.clientX;
 mouse.y=e.clientY;
});

// ===============================
// DRAW
// ===============================
function bg(){
 let g=ctx.createRadialGradient(c.width/2,c.height/2,50,c.width/2,c.height/2,600);
 g.addColorStop(0,"#1a0a1f");
 g.addColorStop(1,"#020204");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,c.width,c.height);
}

// 🌳 TREE
function trunk(){
 if(finalPhase)return;

 let cx=c.width/2,base=c.height*0.8,top=c.height*0.5;
 let ty=base-(base-top)*grow;

 ctx.lineWidth=22;
 ctx.strokeStyle="#7a4a2a";
 ctx.beginPath();
 ctx.moveTo(cx,base);
 ctx.lineTo(cx,ty);
 ctx.stroke();

 branches.forEach(b=>{
  let ex=cx+(b.ex-cx)*grow;
  let ey=ty+(b.ey-ty)*grow;

  ctx.lineWidth=b.w;
  ctx.strokeStyle="rgba(200,140,90,0.55)";
  ctx.beginPath();
  ctx.moveTo(cx,ty);
  ctx.quadraticCurveTo(b.mx,b.my,ex,ey);
  ctx.stroke();
 });
}

// 🍃 LEAF (ANCHOR BASED)
function drawLeaf(l,t){
 let float=Math.sin(t*0.002+l.p)*2;

 let dx=l.baseX-mouse.x;
 let dy=l.baseY-mouse.y;
 let dist=Math.sqrt(dx*dx+dy*dy);

 let x=l.baseX;
 let y=l.baseY+float;

 if(dist<120 && dist!==0){
  let f=(120-dist)*0.05;
  x+=dx/dist*f;
  y+=dy/dist*f;
 }

 let size=l.s*(1+beatPulse*0.25);

 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
 ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
 ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
 ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);

 ctx.fillStyle=l.c;
 ctx.shadowBlur=10;
 ctx.shadowColor=l.c;
 ctx.fill();
 ctx.shadowBlur=0;
}

// ✨ PARTICLES
function drawParticle(p,t){

 if(p.orbit){
  let cx=innerWidth/2,cy=innerHeight/2;
  p.angle+=p.speed;
  p.x=cx+Math.cos(p.angle)*p.radius;
  p.y=cy+Math.sin(p.angle)*p.radius;
 }

 let size=p.base*(1+beatGlow*0.25);

 if(p.type===0){
  ctx.beginPath();
  for(let i=0;i<5;i++){
   let a=i*Math.PI*2/5;
   ctx.lineTo(p.x+Math.sin(a)*size,p.y-Math.cos(a)*size);
  }
  ctx.fillStyle="rgba(255,230,140,0.9)";
  ctx.shadowBlur=20;ctx.shadowColor="#ffd166";
  ctx.fill();ctx.shadowBlur=0;
 }

 else if(p.type===1){
  ctx.strokeStyle="rgba(255,255,255,0.8)";
  ctx.beginPath();
  for(let i=0;i<6;i++){
   let a=i*Math.PI/3;
   ctx.moveTo(p.x,p.y);
   ctx.lineTo(p.x+Math.cos(a)*size,p.y+Math.sin(a)*size);
  }
  ctx.stroke();
 }

 else{
  ctx.beginPath();
  ctx.arc(p.x,p.y,size,0,Math.PI*2);
  ctx.fillStyle="rgba(255,240,180,0.5)";
  ctx.shadowBlur=30;ctx.shadowColor="#ffd166";
  ctx.fill();ctx.shadowBlur=0;
 }

 if(!p.orbit){
  p.y-=p.speed;
  if(p.y<0){
    p.y=c.height;
    p.x=Math.random()*c.width;
  }
 }
}

// 💌 TEXT
const texts=[
"Hey you 💕","Happy Birthday 🎂",
"You make everything brighter ✨",
"Every moment with you matters 💖",
"This little world is for you 🌸"
];

function showText(){
 texts.forEach((m,i)=>{
  setTimeout(()=>{
   let d=document.createElement("div");
   d.textContent=m;
   box.appendChild(d);
  },i*2500);
 });

 setTimeout(()=>btn.style.opacity=1,15000);
}

// 💖 FINAL
btn.onclick=()=>{
 finalPhase=true;
 box.style.opacity=0;

 let f=document.createElement("div");
 f.style.position="fixed";
 f.style.top="50%";
 f.style.left="50%";
 f.style.transform="translate(-50%,-50%)";
 f.style.fontSize="46px";
 f.style.color="white";
 f.style.textAlign="center";
 f.style.textShadow="0 0 25px #ff6fa5";

 f.innerHTML="Happy Birthday<br>Wewe 💕";
 document.body.appendChild(f);

 // 🎬 animation
 let t=0;
 function animFinal(){
  t+=0.02;
  let float=Math.sin(t)*10;
  let scale=1+Math.sin(t*1.2)*0.03;

  f.style.transform=
   `translate(-50%,calc(-50% + ${float}px)) scale(${scale})`;

  requestAnimationFrame(animFinal);
 }
 animFinal();

 // orbit particles
 for(let i=0;i<25;i++){
  particles.push({
    orbit:true,
    angle:Math.random()*Math.PI*2,
    radius:80+Math.random()*40,
    speed:0.01+Math.random()*0.01,
    base:2+Math.random()*2,
    type:2
  });
 }
};

// ===============================
// LOOP
// ===============================
function loop(t){

 bg();

 if(grow<1)grow+=0.01;

 trunk();

 if(grow>0.6){
  leaves.forEach(l=>drawLeaf(l,t));
 }

 particles.forEach(p=>drawParticle(p,t));

 // heartbeat
 beatTimer+=0.016;
 if(beatTimer>(finalPhase?0.6:1)){
  playBeat();
  beatTimer=0;
 }

 beatPulse*=0.92;
 beatGlow*=0.9;

 requestAnimationFrame(loop);
}

// ===============================
// START
// ===============================
document.getElementById("intro").onclick=()=>{
 intro.style.opacity=0;

 setTimeout(()=>{
  intro.style.display="none";
  startAudio();
  showText();
  loop(0);
 },1000);
};
</script>

</body>
</html>
