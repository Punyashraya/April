<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#020204;
  font-family:'Segoe UI';
}

/* 💓 INTRO */
#intro {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:black;
  cursor:pointer;
  z-index:10;
}

.heart {
  width:90px;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  50% { transform:scale(1.15); }
}

/* 💌 TEXT */
.message-box{
 position:absolute;
 right:6%;
 top:28%;
 width:240px;
 color:#fff;
 font-size:15px;
 line-height:1.7;
}

.message{
 opacity:0;
 transform:translateY(20px);
 transition:all 1.5s ease;
 margin-bottom:12px;
 text-shadow:0 0 12px rgba(255,180,140,0.25);
}

/* 💖 BUTTON */
#magicBtn{
 position:absolute;
 right:6%;
 top:60%;
 padding:10px 16px;
 font-size:16px;
 border:none;
 border-radius:20px;
 background:rgba(255,100,150,0.25);
 color:white;
 backdrop-filter:blur(10px);
 cursor:pointer;
 opacity:0;
 transition:all 1s ease;
}

#magicBtn:hover{
 background:rgba(255,100,150,0.45);
 transform:scale(1.05);
}

/* 💖 FINAL TEXT */
#finalText{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 font-size:48px;
 text-align:center;
 color:white;
 opacity:0;
 transition:all 2s ease;
 text-shadow:0 0 30px #ff6fa5, 0 0 70px #ff2e88;
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" id="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>
<div class="message-box" id="box"></div>
<button id="magicBtn">✨ Click me</button>
<div id="finalText">Happy Birthday<br>Wewe 💕</div>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let leaves=[],particles=[],branches=[];
let phase=1;

// 🌳 GENERATE
function gen(){
  let cx=c.width/2,cy=c.height*0.45;

  for(let i=0;i<1300;i++){
    let t=Math.random()*Math.PI*2,r=Math.random();

    let px=16*Math.pow(Math.sin(t),3);
    let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let lx=cx+px*18*r,ly=cy+py*18*r;

    leaves.push({
      x:lx,y:ly,
      s:Math.random()*3+4,
      c:["#ff4d6d","#ff758f","#ff8fa3","#ffd1dc"][Math.floor(Math.random()*4)],
      p:Math.random()*1000
    });

    branches.push({
      ex:lx,ey:ly,
      w:0.5+Math.random()*0.4,
      a:0.4
    });
  }

  for(let i=0;i<120;i++){
    particles.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      size:Math.random()*3+1,
      speed:Math.random()*0.5+0.2
    });
  }
}
gen();

// 🖱️ mouse (hover effect restored)
let mouse={x:0,y:0};
addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// 🌌 BG
function bg(){
  x.fillStyle="#020204";
  x.fillRect(0,0,c.width,c.height);
}

// ❤️ HEART
function heart(px,py,s,col){
  x.beginPath();
  x.moveTo(px,py);
  x.bezierCurveTo(px,py-s,px-s,py-s,px-s,py);
  x.bezierCurveTo(px-s,py+s,px,py+s*1.5,px,py+s*2);
  x.bezierCurveTo(px,py+s*1.5,px+s,py+s,px+s,py);
  x.bezierCurveTo(px+s,py-s,px,py-s,px,py);
  x.fillStyle=col;
  x.fill();
}

// 🌳 TREE
let grow=0;
function tree(){
  if(phase===2) return;

  let cx=c.width/2,base=c.height*0.8,top=c.height*0.5;
  let ty=base-(base-top)*grow;

  x.lineWidth=20;
  x.strokeStyle="#6b3e26";
  x.beginPath();
  x.moveTo(cx,base);
  x.lineTo(cx,ty);
  x.stroke();

  branches.forEach(b=>{
    let ex=cx+(b.ex-cx)*grow;
    let ey=ty+(b.ey-ty)*grow;

    x.strokeStyle="rgba(190,130,80,0.6)";
    x.lineWidth=b.w;

    x.beginPath();
    x.moveTo(cx,ty);
    x.lineTo(ex,ey);
    x.stroke();
  });
}

// ✨ PARTICLES
function drawParticles(){
  particles.forEach(p=>{
    x.beginPath();
    x.arc(p.x,p.y,p.size,0,Math.PI*2);
    x.fillStyle="rgba(255,220,150,0.6)";
    x.fill();

    p.y-=p.speed;
    if(p.y<0) p.y=c.height;
  });
}

// 🎬 ANIM
function anim(t){
  bg();

  if(grow<1) grow+=0.01;

  tree();

  if(phase===1){
    leaves.forEach(l=>{
      let xPos=l.x;
      let yPos=l.y+Math.sin(t*0.002+l.p)*2;

      let dx=xPos-mouse.x;
      let dy=yPos-mouse.y;
      let d=Math.sqrt(dx*dx+dy*dy);

      if(d<120){
        xPos+=dx/d*10;
        yPos+=dy/d*10;
      }

      heart(xPos,yPos,l.s,l.c);
    });
  }

  drawParticles();
  requestAnimationFrame(anim);
}

// 💌 TEXT
const msgs=[
 "Hey you 💕",
 "Happy Birthday 🎂",
 "You make everything brighter ✨",
 "Every moment with you matters 💖",
 "This little world is for you 🌸"
];

function showText(){
  const box=document.getElementById("box");

  msgs.forEach((m,i)=>{
    setTimeout(()=>{
      let d=document.createElement("div");
      d.className="message";
      d.textContent=m;
      box.appendChild(d);

      setTimeout(()=>{
        d.style.opacity=1;
        d.style.transform="translateY(0)";
      },100);

    },i*2500);
  });

  setTimeout(()=>{
    document.getElementById("magicBtn").style.opacity=1;
  }, msgs.length*2500);
}

// 🎁 BUTTON CLICK → FINAL
document.getElementById("magicBtn").onclick=()=>{
  phase=2;

  document.getElementById("box").innerHTML="";
  document.getElementById("magicBtn").style.opacity=0;

  document.getElementById("finalText").style.opacity=1;
};

// 🎬 INTRO
document.getElementById("intro").onclick=()=>{
  intro.style.display="none";
  anim(0);
  showText();
};
</script>

</body>
</html>
