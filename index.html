<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>April ❤️</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#020204;
  font-family:'Segoe UI';
}

/* INTRO */
#intro {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:black;
  cursor:pointer;
  z-index:10;
}

.heart {
  width:90px;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  50% { transform:scale(1.15); }
}

/* TEXT */
.message-box{
 position:absolute;
 right:6%;
 top:28%;
 width:240px;
 color:#fff;
 font-size:15px;
 line-height:1.7;
 opacity:1;
 transition:opacity 1s ease;
}

/* BUTTON */
#finalBtn{
 position:absolute;
 left:6%;
 bottom:40px;
 padding:12px 18px;
 font-size:18px;
 border:none;
 border-radius:20px;
 background:rgba(255,100,150,0.25);
 color:white;
 backdrop-filter:blur(10px);
 cursor:pointer;
 opacity:0;
 transition:all 0.8s ease;
 z-index:5;
}

/* vignette */
body::after{
 content:"";
 position:fixed;
 inset:0;
 pointer-events:none;
 background:radial-gradient(circle, transparent 50%, rgba(0,0,0,0.65));
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" id="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>
<div class="message-box" id="box"></div>
<button id="finalBtn">💖</button>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let leaves=[],particles=[],branches=[];
let finalPhase=false;

// TREE GENERATION
function gen(){
  let cx=c.width/2,cy=c.height*0.45;

  for(let i=0;i<1300;i++){
    let t=Math.random()*Math.PI*2,r=Math.random();

    let px=16*Math.pow(Math.sin(t),3);
    let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let lx=cx+px*18*r,ly=cy+py*18*r;

    leaves.push({
      x:lx,y:ly,
      s:Math.random()*3+4,
      c:["#ff4d6d","#ff758f","#ff8fa3","#ffd1dc","#ffc2d1"][Math.floor(Math.random()*5)],
      p:Math.random()*1000
    });

    branches.push({
      ex:lx,ey:ly,
      mx:(cx+lx)/2+(Math.random()*20-10),
      my:(cy+ly)/2,
      w:0.5+Math.random()*0.4,
      alpha:0.35+Math.random()*0.2
    });
  }

  for(let i=0;i<150;i++){
    particles.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      size:Math.random()*4+1.5,
      speed:Math.random()*0.4+0.2,
      phase:Math.random()*1000,
      type:Math.random()<0.5?0:(Math.random()<0.8?1:2)
    });
  }
}
gen();

// MOUSE
let mouse={x:0,y:0};
addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// BACKGROUND
function bg(){
  let g=x.createRadialGradient(c.width/2,c.height/2,50,c.width/2,c.height/2,600);
  g.addColorStop(0,"#1a0a1f");
  g.addColorStop(1,"#020204");
  x.fillStyle=g;
  x.fillRect(0,0,c.width,c.height);
}

// HEART LEAF (WITH HOVER)
function drawLeaf(l,t){
  let float=Math.sin(t*0.002+l.p)*2;

  let dx=l.x-mouse.x;
  let dy=l.y-mouse.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  let xPos=l.x;
  let yPos=l.y+float;

  if(dist<120 && dist!==0){
    let force=(120-dist)*0.05;
    xPos+=dx/dist*force;
    yPos+=dy/dist*force;
  }

  x.beginPath();
  x.moveTo(xPos,yPos);
  x.bezierCurveTo(xPos,yPos-l.s,xPos-l.s,yPos-l.s,xPos-l.s,yPos);
  x.bezierCurveTo(xPos-l.s,yPos+l.s,xPos,yPos+l.s*1.5,xPos,yPos+l.s*2);
  x.bezierCurveTo(xPos,yPos+l.s*1.5,xPos+l.s,yPos+l.s,xPos+l.s,yPos);
  x.bezierCurveTo(xPos+l.s,yPos-l.s,xPos,yPos-l.s,xPos,yPos);

  x.fillStyle=l.c;
  x.shadowBlur=10;
  x.shadowColor=l.c;
  x.fill();
  x.shadowBlur=0;
}

// PARTICLES
function drawParticle(p,t){

  let dx=p.x-mouse.x;
  let dy=p.y-mouse.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<100 && dist!==0){
    let f=(100-dist)*0.02;
    p.x+=dx/dist*f;
    p.y+=dy/dist*f;
  }

  // STAR
  if(p.type===0){
    let pulse=Math.sin(t*0.004+p.phase)*0.5+0.5;
    let s=p.size*(1+pulse*0.5);

    x.beginPath();
    x.moveTo(p.x, p.y - s);

    for(let i=1;i<5;i++){
      let a=i*Math.PI*2/5;
      let r=i%2===0?s:s*0.4;
      x.lineTo(p.x+Math.sin(a)*r, p.y-Math.cos(a)*r);
    }

    x.closePath();
    x.fillStyle="rgba(255,230,140,0.9)";
    x.shadowBlur=20;
    x.shadowColor="#ffd166";
    x.fill();
    x.shadowBlur=0;
  }

  // SNOW
  else if(p.type===1){
    let s=p.size*1.3;
    x.strokeStyle="rgba(255,255,255,0.85)";
    x.lineWidth=1;

    x.beginPath();
    for(let i=0;i<6;i++){
      let a=i*Math.PI/3;
      x.moveTo(p.x,p.y);
      x.lineTo(p.x+Math.cos(a)*s,p.y+Math.sin(a)*s);
    }
    x.stroke();
  }

  // GLOW
  else{
    let pulse=Math.sin(t*0.002+p.phase)*0.5+0.5;

    x.beginPath();
    x.arc(p.x,p.y,p.size*(0.8+pulse*0.5),0,Math.PI*2);
    x.fillStyle="rgba(255,240,180,0.5)";
    x.shadowBlur=30;
    x.shadowColor="#ffd166";
    x.fill();
    x.shadowBlur=0;
  }

  p.y-=p.speed;
  p.x+=Math.sin(t*0.001+p.phase)*0.25;

  if(p.y<0){
    p.y=c.height;
    p.x=Math.random()*c.width;
  }
}

// TREE
let grow=0;
function tree(){
  if(finalPhase) return;

  let cx=c.width/2,base=c.height*0.8,top=c.height*0.5;
  let ty=base-(base-top)*grow;

  x.lineWidth=22;
  x.strokeStyle="#7a4a2a";
  x.beginPath();
  x.moveTo(cx,base);
  x.lineTo(cx,ty);
  x.stroke();

  branches.forEach(b=>{
    let ex=cx+(b.ex-cx)*grow;
    let ey=ty+(b.ey-ty)*grow;

    x.beginPath();
    x.lineWidth=b.w;
    x.strokeStyle="rgba(200,140,90,0.5)";
    x.moveTo(cx,ty);
    x.quadraticCurveTo(b.mx,b.my,ex,ey);
    x.stroke();
  });
}

// ANIMATION
function anim(t){
  bg();

  if(grow<1) grow+=0.01;

  tree();

  leaves.forEach(l=>{
    if(grow>0.6) drawLeaf(l,t);
  });

  particles.forEach(p=>drawParticle(p,t));

  requestAnimationFrame(anim);
}

// TEXT
const msgs=[
 "Hey you 💕",
 "Happy Birthday 🎂",
 "You make everything brighter ✨",
 "Every moment with you matters 💖",
 "This little world is for you 🌸"
];

function showText(){
  const box=document.getElementById("box");

  msgs.forEach((m,i)=>{
    setTimeout(()=>{
      let d=document.createElement("div");
      d.textContent=m;
      box.appendChild(d);
      d.style.opacity=1;
    },i*2500);
  });

  setTimeout(()=>{
    document.getElementById("finalBtn").style.opacity=1;
  }, msgs.length*2500 + 1500);
}

// FINAL PHASE
document.getElementById("finalBtn").onclick=()=>{
  finalPhase=true;
  leaves=[];
  branches=[];

  const box=document.getElementById("box");
  box.style.opacity=0;

  setTimeout(()=>{ box.innerHTML=""; },1000);

  let final=document.createElement("div");

  final.style.position="fixed";
  final.style.top="50%";
  final.style.left="50%";
  final.style.transform="translate(-50%, -50%)";
  final.style.fontSize="46px";
  final.style.color="white";
  final.style.textAlign="center";
  final.style.opacity="0";
  final.style.transition="opacity 2s ease";
  final.style.textShadow="0 0 25px #ff6fa5, 0 0 60px #ff2e88";

  final.innerHTML="Happy Birthday<br>Wewe 💕";

  document.body.appendChild(final);

  setTimeout(()=>{ final.style.opacity=1; },200);

  document.getElementById("finalBtn").style.opacity=0;
};

// INTRO
document.getElementById("intro").onclick=()=>{
  intro.style.opacity=0;
  setTimeout(()=>{
    intro.style.display="none";
    anim(0);
    showText();
  },1200);
};
  // ===============================
// 🌟 V3 EXTENSION LAYER (ADD ONLY)
// ===============================

// 🎵 MUSIC
const music = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3");
music.loop = true;
music.volume = 0.4;

document.getElementById("intro").addEventListener("click", () => {
  music.play().catch(()=>{});
});

// 🌸 PETALS (separate layer)
let petals = [];
for(let i=0;i<40;i++){
  petals.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    size:Math.random()*4+2,
    speed:Math.random()*0.5+0.2,
    drift:Math.random()*2-1
  });
}

function drawPetals(){
  petals.forEach(p=>{
    x.beginPath();
    x.ellipse(p.x,p.y,p.size,p.size*0.6,0,0,Math.PI*2);
    x.fillStyle="rgba(255,170,190,0.5)";
    x.fill();

    p.y+=p.speed;
    p.x+=p.drift;

    if(p.y>c.height){
      p.y=0;
      p.x=Math.random()*c.width;
    }
  });
}

// 💫 PARALLAX CAMERA
let cam = {x:0,y:0};
addEventListener("mousemove",e=>{
  cam.x = (e.clientX - innerWidth/2) * 0.01;
  cam.y = (e.clientY - innerHeight/2) * 0.01;
});

// 📱 TOUCH SUPPORT
addEventListener("touchmove",e=>{
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
});

// 🌙 DAY → NIGHT SHIFT
let dayProgress = 0;
function dayNight(){
  if(dayProgress < 1) dayProgress += 0.0005;

  let overlay = document.getElementById("dayOverlay");
  if(!overlay){
    overlay = document.createElement("div");
    overlay.id = "dayOverlay";
    overlay.style.position="fixed";
    overlay.style.inset="0";
    overlay.style.pointerEvents="none";
    document.body.appendChild(overlay);
  }

  overlay.style.background =
    `linear-gradient(rgba(255,180,150,${0.2*(1-dayProgress)}), rgba(10,10,30,${dayProgress*0.6}))`;
}

// 💌 HIDDEN NOTES
const notes = [
 "I love you 💕",
 "You are my favorite person 🌸",
 "Forever yours 💖"
];

for(let i=0;i<3;i++){
  let n=document.createElement("div");
  n.innerText="💖";
  n.style.position="fixed";
  n.style.left=(20+i*60)+"%";
  n.style.top="80%";
  n.style.cursor="pointer";
  n.style.fontSize="22px";

  n.onclick=()=>{
    alert(notes[i]);
  };

  document.body.appendChild(n);
}

// 🌪️ PARTICLE SWIRL INTO FINAL TEXT
function swirlToCenter(){
  let cx=innerWidth/2, cy=innerHeight/2;

  particles.forEach(p=>{
    let dx=cx-p.x;
    let dy=cy-p.y;

    p.x += dx*0.03;
    p.y += dy*0.03;
  });
}

// 🧠 PATCH ANIMATION LOOP (WITHOUT MODIFYING BASE)

const originalAnim = anim;

anim = function(t){

  // apply parallax
  x.save();
  x.translate(cam.x, cam.y);

  originalAnim(t);

  x.restore();

  // overlays
  drawPetals();
  dayNight();

  // swirl only in final phase
  if(finalPhase){
    swirlToCenter();
  }
};
  // ===============================
// 💓 HEARTBEAT SYNC
// ===============================

const heartbeat = new Audio("https://cdn.pixabay.com/download/audio/2022/03/10/audio_3d2b9f7c1a.mp3");
heartbeat.volume = 0.25;

let beatTimer = 0;

function playHeartbeat(){
  heartbeat.currentTime = 0;
  heartbeat.play().catch(()=>{});
}

// trigger after intro
document.getElementById("intro").addEventListener("click", ()=>{
  setTimeout(()=>{
    playHeartbeat();
  }, 1200);
});

// sync with animation
const originalAnim2 = anim;

anim = function(t){

  originalAnim2(t);

  // 💓 heartbeat rhythm
  beatTimer += 0.016;

  let interval = finalPhase ? 0.6 : 1; // faster at end

  if(beatTimer > interval){
    playHeartbeat();
    beatTimer = 0;
  }
};

// ===============================
// 💌 ENHANCED HIDDEN MESSAGES
// ===============================

const hiddenMessages = [
  "You're my peace 💖",
  "I adore you 🌸",
  "You make life magical ✨",
  "Always you 💕",
  "My favorite person 💫",
  "You mean everything 💖"
];

function createSparkle(xPos, yPos, msg){

  let el = document.createElement("div");

  el.innerText = "✦";
  el.style.position = "fixed";
  el.style.left = xPos;
  el.style.top = yPos;
  el.style.fontSize = "16px";
  el.style.color = "rgba(255,220,180,0.7)";
  el.style.cursor = "pointer";
  el.style.opacity = "0.3";
  el.style.transition = "all 0.6s ease";
  el.style.textShadow = "0 0 8px rgba(255,200,150,0.5)";

  // ✨ subtle floating animation
  let floatOffset = Math.random()*20;

  setInterval(()=>{
    el.style.transform = `translateY(${Math.sin(Date.now()*0.001 + floatOffset)*5}px)`;
  },30);

  // ✨ shimmer effect
  setInterval(()=>{
    el.style.opacity = 0.2 + Math.random()*0.5;
  },800);

  // 💌 click interaction
  el.onclick = ()=>{
    let note = document.createElement("div");

    note.innerText = msg;
    note.style.position = "fixed";
    note.style.top = "50%";
    note.style.left = "50%";
    note.style.transform = "translate(-50%,-50%)";
    note.style.fontSize = "22px";
    note.style.color = "#fff";
    note.style.padding = "10px 20px";
    note.style.borderRadius = "20px";
    note.style.background = "rgba(255,120,160,0.2)";
    note.style.backdropFilter = "blur(10px)";
    note.style.textShadow = "0 0 10px rgba(255,150,200,0.6)";
    note.style.opacity = "0";
    note.style.transition = "opacity 0.6s ease";

    document.body.appendChild(note);

    setTimeout(()=> note.style.opacity=1, 50);

    setTimeout(()=>{
      note.style.opacity=0;
      setTimeout(()=> note.remove(),600);
    },2500);
  };

  document.body.appendChild(el);
}

// scatter sparkles (hidden)
setTimeout(()=>{
  for(let i=0;i<hiddenMessages.length;i++){

    createSparkle(
      Math.random()*80 + 10 + "%",
      Math.random()*70 + 15 + "%",
      hiddenMessages[i]
    );
  }
}, 4000);
  // ===============================
// 💓 VISUAL HEARTBEAT SYNC
// ===============================

let beatPulse = 0;
let beatGlow = 0;

// hook into heartbeat trigger
const originalPlayHeartbeat = playHeartbeat;

playHeartbeat = function(){
  originalPlayHeartbeat();

  // trigger visual pulse
  beatPulse = 1;
  beatGlow = 1;
};

// 🌳 override leaf rendering (ADD effect without breaking base)
const originalDrawLeaf = drawLeaf;

drawLeaf = function(l,t){

  // scale pulse
  let pulseScale = 1 + (beatPulse * 0.25);

  let originalSize = l.s;
  l.s = originalSize * pulseScale;

  originalDrawLeaf(l,t);

  l.s = originalSize;
};

// 🌌 screen glow overlay
let glowLayer = document.createElement("div");
glowLayer.style.position = "fixed";
glowLayer.style.inset = "0";
glowLayer.style.pointerEvents = "none";
glowLayer.style.zIndex = "3";
document.body.appendChild(glowLayer);

// 🎬 extend animation safely
const originalAnim3 = anim;

anim = function(t){

  originalAnim3(t);

  // decay pulse
  beatPulse *= 0.92;
  beatGlow *= 0.9;

  // ✨ glow flash
  glowLayer.style.background =
    `radial-gradient(circle at center,
      rgba(255,120,160,${0.15 * beatGlow}),
      transparent 60%)`;

  // ✨ boost particles glow subtly
  particles.forEach(p=>{
    if(beatGlow > 0.1){
      p.size *= (1 + beatGlow * 0.02);
    }
  });
};
  // ===============================
// 💓 FIX PARTICLE GROWTH BUG
// ===============================

// store original size once
particles.forEach(p=>{
  if(!p.baseSize){
    p.baseSize = p.size;
  }
});

// override particle rendering safely
const originalDrawParticle = drawParticle;

drawParticle = function(p,t){

  // ensure base size exists
  if(!p.baseSize) p.baseSize = p.size;

  // apply temporary pulse (no permanent growth)
  let scale = 1 + (beatGlow * 0.25);
  let originalSize = p.size;

  p.size = p.baseSize * scale;

  originalDrawParticle(p,t);

  // restore size (critical fix)
  p.size = originalSize;
};
  // ===============================
// 🎬 PHASE 3 CINEMATIC ADD-ON (SAFE)
// ===============================

// hook into existing final button WITHOUT replacing it
document.getElementById("finalBtn").addEventListener("click", ()=>{

  // delay slightly so original logic runs first
  setTimeout(()=>{

    // 🌟 EXPLOSION
    particles.forEach(p=>{
      p.x += (Math.random()-0.5)*300;
      p.y += (Math.random()-0.5)*300;
    });

    // ⚡ FLASH
    let flash=document.createElement("div");
    flash.style.position="fixed";
    flash.style.inset="0";
    flash.style.background="white";
    flash.style.opacity="0.85";
    flash.style.transition="opacity 1s ease";
    flash.style.pointerEvents="none";
    flash.style.zIndex="20";
    document.body.appendChild(flash);

    setTimeout(()=> flash.style.opacity=0,50);
    setTimeout(()=> flash.remove(),1000);

    // 🕊️ SLOW MOTION
    particles.forEach(p=>{
      p.speed *= 0.3;
    });

    // 💓 DOUBLE HEARTBEAT
    setTimeout(()=>{
      if(typeof playHeartbeat === "function"){
        playHeartbeat();
        playHeartbeat();
      }
    },200);

    // 🌫️ BACKGROUND FOCUS
    c.style.transition="filter 1s ease";
    c.style.filter="blur(2px) brightness(0.8)";
    setTimeout(()=> c.style.filter="none",2000);

    // 💖 FIND FINAL TEXT (created by your base code)
    let finalText;

    const waitForText = setInterval(()=>{
      finalText = Array.from(document.body.children)
        .find(el => el.innerHTML && el.innerHTML.includes("Happy Birthday"));

      if(finalText){
        clearInterval(waitForText);
        enhanceFinalText(finalText);
      }
    },50);

  },100); // small delay so base click executes first
});


// ===============================
// 💖 ENHANCE FINAL TEXT (NO REPLACE)
// ===============================

function enhanceFinalText(el){

  // ✍️ TYPEWRITER EFFECT (replace content safely)
  const message = el.innerText.replace(/\n/g," ").trim() || "Happy Birthday 💕";

  el.innerHTML = "";

  let i=0;
  function type(){
    if(i < message.length){
      el.innerHTML += message[i] === " " ? "&nbsp;" : message[i];
      i++;
      setTimeout(type,50);
    }
  }
  type();

  // 🌈 GRADIENT STYLE
  el.style.background="linear-gradient(90deg,#ff8fa3,#ffd1dc,#ff8fa3)";
  el.style.backgroundSize="200% 100%";
  el.style.webkitBackgroundClip="text";
  el.style.webkitTextFillColor="transparent";

  // 💫 FLOAT + GLOW LOOP
  let t=0;
  function animate(){
    t+=0.02;

    let floatY = Math.sin(t*0.8)*6;
    let scale = 1 + Math.sin(t)*0.02;
    let glow = 20 + Math.sin(t*2)*15;

    el.style.transform =
      `translate(-50%, calc(-50% + ${floatY}px)) scale(${scale})`;

    el.style.textShadow = `
      0 0 ${glow}px rgba(255,120,160,0.6),
      0 0 ${glow*2}px rgba(255,80,140,0.4)
    `;

    el.style.backgroundPosition = `${(t*40)%200}% 50%`;

    requestAnimationFrame(animate);
  }
  animate();

  // 💞 ORBIT HEARTS
  createOrbitHearts();

  // 🌌 PARTICLE ATTRACTION
  attractParticlesToCenter();
}


// ===============================
// 💞 ORBITING HEARTS
// ===============================

function createOrbitHearts(){

  let hearts=[];

  for(let i=0;i<30;i++){
    hearts.push({
      angle:Math.random()*Math.PI*2,
      radius:Math.random()*80+40,
      speed:Math.random()*0.01+0.005
    });
  }

  function draw(){
    hearts.forEach(h=>{
      h.angle+=h.speed;

      let xPos = innerWidth/2 + Math.cos(h.angle)*h.radius;
      let yPos = innerHeight/2 + Math.sin(h.angle)*h.radius;

      x.beginPath();
      x.arc(xPos,yPos,2.5,0,Math.PI*2);
      x.fillStyle="rgba(255,120,160,0.8)";
      x.fill();
    });

    requestAnimationFrame(draw);
  }

  draw();
}


// ===============================
// 🌌 PARTICLE ATTRACTION
// ===============================

function attractParticlesToCenter(){

  function loop(){
    let cx=innerWidth/2;
    let cy=innerHeight/2;

    particles.forEach(p=>{
      let dx=cx-p.x;
      let dy=cy-p.y;

      p.x += dx*0.01;
      p.y += dy*0.01;
    });

    requestAnimationFrame(loop);
  }

  loop();
}

  // ===============================
// 🌌 PARTICLE TEXT FORMATION (SAFE ADD-ON)

function particleTextForm(el){

  // create hidden canvas to read text pixels
  const tempCanvas = document.createElement("canvas");
  const ctx = tempCanvas.getContext("2d");

  tempCanvas.width = innerWidth;
  tempCanvas.height = innerHeight;

  // draw text
  ctx.fillStyle = "white";
  ctx.font = "bold 80px Segoe UI";
  ctx.textAlign = "center";

  ctx.fillText("Happy Birthday", innerWidth/2, innerHeight/2 - 20);
  ctx.fillText("Wewe 💕", innerWidth/2, innerHeight/2 + 60);

  const data = ctx.getImageData(0,0,tempCanvas.width,tempCanvas.height).data;

  let targets = [];

  // scan pixels → create target points
  for(let y=0;y<tempCanvas.height;y+=6){
    for(let xPos=0;xPos<tempCanvas.width;xPos+=6){

      let i = (y * tempCanvas.width + xPos) * 4;

      if(data[i+3] > 150){ // visible pixel
        targets.push({x:xPos, y:y});
      }
    }
  }

  // hide original text
  el.style.opacity = 0;

  // assign particles to targets
  for(let i=0;i<particles.length;i++){

    let t = targets[i % targets.length];

    particles[i].tx = t.x;
    particles[i].ty = t.y;
    particles[i].forming = true;
  }

  // start animation
  animateParticleText();
}


// ===============================

function animateParticleText(){

  function loop(){

    particles.forEach(p=>{

      if(p.forming){

        let dx = p.tx - p.x;
        let dy = p.ty - p.y;

        // smooth easing
        p.x += dx * 0.08;
        p.y += dy * 0.08;

        // glow boost
        p.size = (p.baseSize || p.size) * 1.5;
      }
    });

    requestAnimationFrame(loop);
  }

  loop();
}

let particlePhase = "forming";
let phaseTimer = 0;

function animateParticleText(){

  function loop(){

    phaseTimer += 0.016;

    particles.forEach(p=>{

      if(p.forming){

        let dx = p.tx - p.x;
        let dy = p.ty - p.y;

        p.x += dx * 0.08;
        p.y += dy * 0.08;

        if(Math.abs(dx)+Math.abs(dy) < 1){
          p.locked = true;
        }

      }

      // 💓 LOCKED → PULSE + SHIMMER
      if(p.locked){

        // heartbeat pulse
        let pulse = 1 + Math.sin(Date.now()*0.01)*0.3;
        p.size = (p.baseSize || p.size) * pulse * 1.8;

        // shimmer drift
        p.x += Math.sin(Date.now()*0.002 + p.phase)*0.2;
        p.y += Math.cos(Date.now()*0.002 + p.phase)*0.2;
      }

      // 🕊️ DISPERSAL
      if(particlePhase === "disperse"){

        p.locked = false;

        let angle = Math.atan2(p.y - innerHeight/2, p.x - innerWidth/2);

        p.x += Math.cos(angle) * 2 + (Math.random()-0.5)*2;
        p.y += Math.sin(angle) * 2 + (Math.random()-0.5)*2;

        p.size *= 0.98;
      }

    });

    // ===============================
    // ⏳ PHASE CONTROL
    // ===============================

    if(particlePhase === "forming" && phaseTimer > 3){
      particlePhase = "hold";
      phaseTimer = 0;
    }

    if(particlePhase === "hold" && phaseTimer > 3){
      particlePhase = "disperse";
      phaseTimer = 0;
    }

    if(particlePhase === "disperse" && phaseTimer > 3){
      particlePhase = "forming";
      phaseTimer = 0;

      // reassign targets again (loop)
      particles.forEach(p=>{
        if(p.tx && p.ty){
          p.forming = true;
        }
      });
    }

    requestAnimationFrame(loop);
  }

  loop();
}

// 👆 TAP INTERACTION (particle attraction burst)
let touchPoint = null;

function triggerTouchEffect(x, y){
  touchPoint = {x, y, life: 1};
}

addEventListener("touchstart", e=>{
  let t = e.touches[0];
  triggerTouchEffect(t.clientX, t.clientY);
});

addEventListener("click", e=>{
  triggerTouchEffect(e.clientX, e.clientY);
});

// 💫 TOUCH EFFECT UPDATE
function updateTouchEffect(){
  if(!touchPoint) return;

  particles.forEach(p=>{
    let dx = touchPoint.x - p.x;
    let dy = touchPoint.y - p.y;

    p.x += dx * 0.02 * touchPoint.life;
    p.y += dy * 0.02 * touchPoint.life;
  });

  touchPoint.life *= 0.92;

  if(touchPoint.life < 0.05){
    touchPoint = null;
  }
}

// 🌊 RIPPLE VISUAL
let ripples = [];

function createRipple(x,y){
  ripples.push({x,y,r:0,alpha:1});
}

addEventListener("touchstart", e=>{
  let t=e.touches[0];
  createRipple(t.clientX,t.clientY);
});

addEventListener("click", e=>{
  createRipple(e.clientX,e.clientY);
});

function drawRipples(){
  ripples.forEach(r=>{
    x.beginPath();
    x.arc(r.x,r.y,r.r,0,Math.PI*2);
    x.strokeStyle = `rgba(255,180,200,${r.alpha})`;
    x.lineWidth = 2;
    x.stroke();

    r.r += 2;
    r.alpha *= 0.95;
  });

  ripples = ripples.filter(r=>r.alpha>0.05);
}

// ===============================
// 🌌 PARTICLE CONTROL ENGINE
// ===============================

function insaneLoop(){

  insaneTimer += 0.016;

  // FORM → HOLD → DISSOLVE
  if(insanePhase === "forming" && insaneTimer > 3){
    insanePhase = "hold";
    insaneTimer = 0;
  }

  if(insanePhase === "hold" && insaneTimer > 3){
    insanePhase = "dissolve";
    insaneTimer = 0;
  }

  if(insanePhase === "dissolve" && insaneTimer > 2){
    insanePhase = "finalText";
    insaneTimer = 0;
    finalizeScene();
  }

  particles.forEach(p=>{

    // 💓 FORMING
    if(insanePhase === "forming" && p.tx){
      let dx = p.tx - p.x;
      let dy = p.ty - p.y;

      p.x += dx * 0.08;
      p.y += dy * 0.08;
    }

    // 💖 HOLD (pulse + shimmer)
    if(insanePhase === "hold" && p.tx){

      let pulse = 1 + Math.sin(Date.now()*0.01)*0.3;
      p.size = (p.baseSize || p.size) * pulse * 1.6;

      p.x += Math.sin(Date.now()*0.002 + p.phase)*0.2;
      p.y += Math.cos(Date.now()*0.002 + p.phase)*0.2;
    }

    // ✨ DISSOLVE INTO DUST
    if(insanePhase === "dissolve"){

      let angle = Math.random()*Math.PI*2;

      p.x += Math.cos(angle)*2;
      p.y += Math.sin(angle)*2;

      p.size *= 0.96;
    }

  });

  requestAnimationFrame(insaneLoop);
}


// ===============================
// 💫 FINAL CLEAN SCENE
// ===============================

function finalizeScene(){

  // remove particles visually
  particles.forEach(p=>{
    p.size = 0;
  });

  // darken background slightly
  let fade = document.createElement("div");
  fade.style.position="fixed";
  fade.style.inset="0";
  fade.style.background="rgba(0,0,0,0.4)";
  fade.style.opacity="0";
  fade.style.transition="opacity 2s ease";
  fade.style.pointerEvents="none";
  fade.style.zIndex="1";
  document.body.appendChild(fade);

  setTimeout(()=> fade.style.opacity=1,50);

  // enhance text to final elegant state
  if(finalElementRef){

    finalElementRef.style.fontSize="52px";
    finalElementRef.style.letterSpacing="3px";

    finalElementRef.style.textShadow = `
      0 0 20px rgba(255,150,200,0.8),
      0 0 60px rgba(255,100,180,0.5),
      0 0 120px rgba(255,80,160,0.4)
    `;

    // gentle breathing
    let t=0;
    function breathe(){
      t+=0.02;

      let scale = 1 + Math.sin(t)*0.03;

      finalElementRef.style.transform =
        `translate(-50%, -50%) scale(${scale})`;

      requestAnimationFrame(breathe);
    }
    breathe();
  }

}

  let cy = innerHeight/2;

  for(let t=0;t<Math.PI*2;t+=0.08){

    let xh = 16*Math.pow(Math.sin(t),3);

    bossTargets.push({
      x: cx + xh*10,
      y: cy + yh*10
    });

}
