<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

/* Text styling */
.message {
  position: absolute;
  top: 40%;
  left: 8%;
  color: white;
}

.message h1 {
  font-size: 24px;
  margin: 0;
}

.message p {
  font-size: 18px;
}
</style>
</head>

<body>

<div class="message">
  <h1>Hey you 💕</h1>
  <p>Happy Birthday</p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

// Heart shape function
function heartShape(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

// Create particles
for (let i = 0; i < 1500; i++) {
  let t = Math.random() * Math.PI * 2;
  let pos = heartShape(t);

  particles.push({
    x: canvas.width * 0.7 + pos.x * 10,
    y: canvas.height * 0.4 + pos.y * 10,
    size: Math.random() * 4 + 1,
    color: `hsl(${Math.random()*360},100%,70%)`
  });
}

// Draw trunk
function drawTreeTrunk() {
  ctx.fillStyle = "#f8c8dc";
  ctx.fillRect(canvas.width * 0.69, canvas.height * 0.45, 20, 200);
}

// Draw particles
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawTreeTrunk();

  particles.forEach(p => {
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
