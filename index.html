<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #050505;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌑 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #050505;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  cursor: pointer;
}

.heart {
  width: 100px;
  height: 100px;
  animation: pulse 1.6s infinite;
  pointer-events: auto;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* 💌 TEXT */
.message-box {
  position: absolute;
  right: 6%;
  top: 30%;
  width: 260px;
  color: white;
  font-size: 18px;
  line-height: 1.7;
}

.message {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.5s ease;
  margin-bottom: 12px;
  text-shadow: 0 0 8px rgba(255,100,150,0.3);
}
</style>
</head>

<body>

<div id="intro">
  <svg class="heart" viewBox="0 0 100 100">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3.5"/>
      </filter>
    </defs>

    <path d="M50 90 
             L20 60 
             A20 20 0 1 1 50 30 
             A20 20 0 1 1 80 60 
             Z"
          fill="#4a0f2a"
          stroke="#ff2e88"
          stroke-width="2.5"
          filter="url(#glow)"/>
  </svg>
</div>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const staticCanvas = document.createElement("canvas");
const staticCtx = staticCanvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  staticCanvas.width = canvas.width;
  staticCanvas.height = canvas.height;

  generateTree();
  drawStaticTree();
}
resize();
window.addEventListener("resize", resize);

const centerX = () => canvas.width/2;
const centerY = () => canvas.height*0.45;

// 🌌 background
function drawBackground(){
  let g = ctx.createRadialGradient(centerX(), centerY(), 50, centerX(), centerY(), 600);
  g.addColorStop(0,"#111");
  g.addColorStop(1,"#050505");

  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 🌠 PARTICLES
let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2+1,
    speed:Math.random()*0.5+0.2,
    phase:Math.random()*1000
  });
}

function drawParticles(time){
  particles.forEach(p=>{
    let float = Math.sin(time*0.001 + p.phase)*10;

    ctx.beginPath();
    ctx.arc(p.x, p.y + float, p.size, 0, Math.PI*2);

    ctx.fillStyle="rgba(255,180,120,0.4)";
    ctx.shadowBlur=10;
    ctx.shadowColor="rgba(255,180,120,0.6)";
    ctx.fill();
    ctx.shadowBlur=0;

    p.y -= p.speed;
    if(p.y < 0){
      p.y = canvas.height;
      p.x = Math.random()*canvas.width;
    }
  });
}

// 🌳 TREE
const colors = ["#ff4d6d","#ff758f","#ff8fa3","#ffd166","#f4a261"];
let hearts=[];
let branches=[];

function generateTree(){
  hearts=[];
  branches=[];

  let trunkTop={x:centerX(),y:canvas.height*0.5};

  for(let i=0;i<1500;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let hx=centerX()+x*18*r;
    let hy=centerY()+y*18*r;

    hearts.push({
      x:hx,
      y:hy,
      size:Math.random()*3+5,
      color:colors[Math.floor(Math.random()*colors.length)],
      phase:Math.random()*1000
    });

    branches.push({
      sx:trunkTop.x,
      sy:trunkTop.y,
      c1x: trunkTop.x + (hx-trunkTop.x)*0.3 + (Math.random()*40-20),
      c1y: trunkTop.y + (hy-trunkTop.y)*0.3,
      c2x: trunkTop.x + (hx-trunkTop.x)*0.7 + (Math.random()*40-20),
      c2y: trunkTop.y + (hy-trunkTop.y)*0.7,
      ex:hx,
      ey:hy
    });
  }
}

// 🌳 STATIC TREE
function drawStaticTree(){
  staticCtx.clearRect(0,0,canvas.width,canvas.height);

  let x=centerX();
  let y=canvas.height*0.75;

  staticCtx.beginPath();
  staticCtx.moveTo(x-30,y);
  staticCtx.bezierCurveTo(x-60,y-120,x-20,y-230,x-10,y-270);
  staticCtx.lineTo(x+10,y-270);
  staticCtx.bezierCurveTo(x+20,y-230,x+60,y-120,x+30,y);
  staticCtx.fillStyle="#6b3e26";
  staticCtx.fill();

  staticCtx.lineWidth=0.8;

  branches.forEach(b=>{
    staticCtx.beginPath();
    staticCtx.moveTo(b.sx,b.sy);
    staticCtx.bezierCurveTo(b.c1x,b.c1y,b.c2x,b.c2y,b.ex,b.ey);

    staticCtx.strokeStyle="rgba(255,170,90,0.18)";
    staticCtx.shadowBlur=8;
    staticCtx.shadowColor="rgba(255,170,90,0.5)";
    staticCtx.stroke();

    staticCtx.shadowBlur=0;
    staticCtx.strokeStyle="rgba(120,70,30,0.5)";
    staticCtx.stroke();
  });
}

// 🖱️ hover
let mouse={x:0,y:0};
window.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// ❤️ draw heart
function drawHeart(x,y,size,color){
  ctx.beginPath();
  ctx.fillStyle=color;

  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
  ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
  ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
  ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);

  ctx.fill();
}

let started=false;

// ✨ animate
function animate(time){
  if(!started) return;

  drawBackground();
  drawParticles(time);
  ctx.drawImage(staticCanvas,0,0);

  hearts.forEach(h=>{
    let float=Math.sin(time*0.002+h.phase)*2;

    let x=h.x;
    let y=h.y+float;

    let dx=x-mouse.x;
    let dy=y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<120 && dist!==0){
      let force=(120-dist)*0.05;
      x+=dx/dist*force;
      y+=dy/dist*force;
    }

    drawHeart(x,y,h.size,h.color);
  });

  requestAnimationFrame(animate);
}

// 💌 messages
const messages=[
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything brighter ✨",
  "Every moment with you matters 💖",
  "This little world is for you 🌸"
];

function showMessages(){
  const box=document.getElementById("messageBox");

  messages.forEach((msg,i)=>{
    setTimeout(()=>{
      const div=document.createElement("div");
      div.className="message";
      div.textContent=msg;
      box.appendChild(div);

      setTimeout(()=>{
        div.style.opacity=1;
        div.style.transform="translateY(0)";
      },100);

    }, i*2500);
  });
}

// 💓 CLICK (FIXED)
document.getElementById("intro").addEventListener("click",()=>{
  const intro=document.getElementById("intro");

  intro.style.opacity=0;

  setTimeout(()=>{
    intro.style.display="none";
  },1000);

  started=true;
  requestAnimationFrame(animate);
  showMessages();
});
</script>

</body>
</html>
