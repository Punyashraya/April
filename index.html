<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:#020204;
  font-family:'Segoe UI';
}

/* 🎬 INTRO */
#intro {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:10;
  cursor:pointer;
}

.heart {
  width:90px;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  50% { transform:scale(1.15); }
}

/* 💌 TEXT */
.message-box{
 position:absolute;
 right:6%;
 top:30%;
 width:240px;
 color:#fff;
 font-size:16px;
 line-height:1.6;
}

.message{
 opacity:0;
 transform:translateY(20px);
 transition:all 1.5s ease;
 margin-bottom:10px;
}

/* 🎥 vignette */
body::after{
 content:"";
 position:fixed;
 inset:0;
 pointer-events:none;
 background:radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6));
}
</style>
</head>

<body>

<div id="intro">
<svg class="heart" id="heart" viewBox="0 0 100 100">
<path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
fill="#4a0f2a" stroke="#ff2e88" stroke-width="2.5"/>
</svg>
</div>

<canvas id="c"></canvas>
<div class="message-box" id="box"></div>

<script>
const c=document.getElementById("c"),x=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize();addEventListener("resize",resize);

let leaves=[],particles=[],branches=[];

// 🌳 GENERATE
function gen(){
  let cx=c.width/2,cy=c.height*0.45;

  for(let i=0;i<1200;i++){
    let t=Math.random()*Math.PI*2,r=Math.random();

    let px=16*Math.pow(Math.sin(t),3);
    let py=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let lx=cx+px*18*r,ly=cy+py*18*r;

    leaves.push({
      x:lx,y:ly,
      s:Math.random()*3+4,
      c:["#ff4d6d","#ff8fa3","#ffd1dc","#ffc2d1"][Math.floor(Math.random()*4)],
      p:Math.random()*1000
    });

    branches.push({
      ex:lx,ey:ly,
      cx:cx+(lx-cx)*0.5,
      cy:cy+(ly-cy)*0.5
    });
  }

  for(let i=0;i<100;i++){
    particles.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      size:Math.random()*3+2,
      speed:Math.random()*0.4+0.2,
      phase:Math.random()*1000
    });
  }
}
gen();

// 🖱️ MOUSE
let mouse={x:0,y:0};
addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

// 🌌 BG
function bg(){
  let g=x.createRadialGradient(c.width/2,c.height/2,50,c.width/2,c.height/2,600);
  g.addColorStop(0,"#1a0a1f");
  g.addColorStop(1,"#020204");
  x.fillStyle=g;
  x.fillRect(0,0,c.width,c.height);
}

// ❤️ HEART
function heart(px,py,s,col){
  x.beginPath();
  x.moveTo(px,py);
  x.bezierCurveTo(px,py-s,px-s,py-s,px-s,py);
  x.bezierCurveTo(px-s,py+s,px,py+s*1.5,px,py+s*2);
  x.bezierCurveTo(px,py+s*1.5,px+s,py+s,px+s,py);
  x.bezierCurveTo(px+s,py-s,px,py-s,px,py);
  x.fillStyle=col;
  x.shadowBlur=10;
  x.shadowColor=col;
  x.fill();
  x.shadowBlur=0;
}

// ⭐ PARTICLE
function star(px,py,size,time){
  let flicker=Math.sin(time*0.004+size)*0.5+0.5;
  let s=size*(1+flicker*0.5);

  x.beginPath();
  x.moveTo(px,py-s);
  x.lineTo(px+s*0.4,py);
  x.lineTo(px,py+s);
  x.lineTo(px-s*0.4,py);
  x.closePath();

  x.fillStyle="rgba(255,230,140,"+(0.7+flicker*0.3)+")";
  x.shadowBlur=15;
  x.shadowColor="#ffd166";
  x.fill();

  x.beginPath();
  x.arc(px,py,s*0.25,0,Math.PI*2);
  x.fill();

  x.shadowBlur=0;
}

let grow=0,started=false;

// 🌳 TREE
function tree(){
  let cx=c.width/2,base=c.height*0.8,top=c.height*0.5;
  let ty=base-(base-top)*grow;

  let grad=x.createLinearGradient(cx,base,cx,ty);
  grad.addColorStop(0,"#5a3b24");
  grad.addColorStop(1,"#8b5e3c");

  x.lineWidth=20;
  x.strokeStyle=grad;
  x.beginPath();
  x.moveTo(cx,base);
  x.lineTo(cx,ty);
  x.stroke();

  branches.forEach(b=>{
    x.beginPath();
    x.moveTo(cx,ty);
    x.quadraticCurveTo(b.cx,b.cy,cx+(b.ex-cx)*grow,ty+(b.ey-ty)*grow);
    x.stroke();
  });
}

// ✨ ANIMATION
function anim(t){
  if(!started) return;

  bg();

  if(grow<1) grow+=0.01;

  tree();

  leaves.forEach(l=>{
    if(grow>0.6){
      let xPos=l.x;
      let yPos=l.y+Math.sin(t*0.002+l.p)*2;

      let dx=xPos-mouse.x;
      let dy=yPos-mouse.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120 && dist!==0){
        let f=(120-dist)*0.05;
        xPos+=dx/dist*f;
        yPos+=dy/dist*f;
      }

      heart(xPos,yPos,l.s,l.c);
    }
  });

  particles.forEach(p=>{
    star(p.x,p.y,p.size,t);
    p.y-=p.speed;
    if(p.y<0){p.y=c.height;p.x=Math.random()*c.width;}
  });

  requestAnimationFrame(anim);
}

// 💌 TEXT
const msgs=[
 "Hey you 💕",
 "Happy Birthday 🎂",
 "You make everything brighter ✨",
 "Every moment with you matters 💖",
 "This little world is for you 🌸"
];

function showText(){
  const box=document.getElementById("box");

  msgs.forEach((m,i)=>{
    setTimeout(()=>{
      let d=document.createElement("div");
      d.className="message";
      d.textContent=m;
      box.appendChild(d);

      setTimeout(()=>{
        d.style.opacity=1;
        d.style.transform="translateY(0)";
      },100);

    },i*2500);
  });
}

// 🎬 CINEMATIC CLICK
document.getElementById("intro").onclick=()=>{
  const heartEl=document.getElementById("heart");

  heartEl.style.transition="1s";
  heartEl.style.transform="translateY(300px) scale(0.8)";
  heartEl.style.opacity=0.7;

  setTimeout(()=>{
    document.getElementById("intro").style.opacity=0;
  },800);

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    started=true;
    anim(0);
    showText();
  },1500);
};
</script>

</body>
</html>
