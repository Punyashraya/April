<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunset Heart Tree Picnic ❤️</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* semi-transparent overlay to highlight tree */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: -1;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}

.message-box {
  position: absolute;
  right: 5%;
  top: 25%;
  width: 300px;
  font-size: 22px;
  line-height: 1.6;
  z-index: 2;
}

.message {
  opacity: 0;
  margin-bottom: 10px;
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>

<!-- Background video -->
<video id="bgVideo" autoplay loop muted>
  <source src="sunset_picnic.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<!-- Dark overlay for better tree contrast -->
<div id="overlay"></div>

<!-- Canvas for tree and hearts -->
<canvas id="canvas"></canvas>

<!-- Messages -->
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Heart leaf colors
const colors = ["#ff4d6d","#ff758f","#ff8fa3","#ffd166","#f4a261"];

let hearts = [];
for (let i = 0; i < 2000; i++) {
  let t = Math.random() * Math.PI * 2;
  let r = Math.random();
  let pos = {
    x: 16*Math.pow(Math.sin(t),3),
    y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
  hearts.push({
    x: canvas.width*0.5 + pos.x*20*r,
    y: canvas.height*0.45 + pos.y*20*r,
    size: Math.random()*4 + 5,
    color: colors[Math.floor(Math.random()*colors.length)],
    offset: Math.random()*1000
  });
}

// Draw trunk
function drawTrunk() {
  let baseX = canvas.width*0.5;
  let baseY = canvas.height*0.75;
  ctx.beginPath();
  ctx.moveTo(baseX-20, baseY);
  ctx.lineTo(baseX-10, baseY-160);
  ctx.lineTo(baseX+10, baseY-160);
  ctx.lineTo(baseX+20, baseY);
  ctx.closePath();
  ctx.fillStyle = "#8b5e3c";
  ctx.fill();
  ctx.strokeStyle = "#a9745b";
  ctx.lineWidth = 2;
  ctx.stroke();
}

// Draw heart leaf
function drawHeart(x,y,size,color){
  ctx.beginPath();
  ctx.fillStyle=color;
  ctx.moveTo(x,y);
  ctx.bezierCurveTo(x,y-size,x-size,y-size,x-size,y);
  ctx.bezierCurveTo(x-size,y+size,x,y+size*1.6,x,y+size*2);
  ctx.bezierCurveTo(x,y+size*1.6,x+size,y+size,x+size,y);
  ctx.bezierCurveTo(x+size,y-size,x,y-size,x,y);
  ctx.fill();
}

// Animate tree and hearts
function animate(time){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawTrunk();

  hearts.forEach(h=>{
    let float = Math.sin(time*0.002+h.offset)*2;
    drawHeart(h.x,h.y+float,h.size,h.color);
  });

  requestAnimationFrame(animate);
}

animate(0);

// Messages
const messages = [
  "Hey you 💕",
  "Happy Birthday 🎂",
  "You make everything brighter ✨",
  "Stay amazing always 💖",
  "This world is for you 🌸"
];

const box = document.getElementById("messageBox");
let index = 0;
function addMessage(){
  if(index>=messages.length) return;
  const div=document.createElement("div");
  div.className="message";
  div.textContent=messages[index];
  box.appendChild(div);
  index++;
}

setInterval(addMessage,2500);
</script>

</body>
</html>
