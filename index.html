<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #050505;
  font-family: 'Segoe UI', sans-serif;
}

/* 🌑 INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #050505;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  transition: opacity 1.5s ease;
}

/* 💓 CLEAN HEART */
.heart {
  width: 90px;
  height: 90px;
  animation: pulse 1.6s infinite;
}

.heart path {
  fill: #5a0f2e;
  stroke: #ff2e88;
  stroke-width: 3;
  stroke-linejoin: round;
  filter: blur(0.5px); /* subtle smooth edge */
}

/* separate glow layer (no square issue) */
.heart path.glow {
  fill: none;
  stroke: #ff2e88;
  stroke-width: 6;
  opacity: 0.6;
  filter: blur(8px);
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* 💌 TEXT */
.message-box {
  position: absolute;
  right: 6%;
  top: 30%;
  width: 260px;
  color: white;
  font-size: 18px;
  line-height: 1.7;
}

.message {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.5s ease;
  margin-bottom: 12px;
  text-shadow: 0 0 8px rgba(255,100,150,0.3);
}
</style>
</head>

<body>

<!-- 💓 INTRO -->
<div id="intro">
  <svg class="heart" viewBox="0 0 100 100">
    <path class="glow" d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"/>
    <path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"/>
  </svg>
</div>

<canvas id="canvas"></canvas>
<div class="message-box" id="messageBox"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const centerX = () => canvas.width/2;
const centerY = () => canvas.height*0.45;

// 🌌 BACKGROUND
function drawBackground(){
  let grad = ctx.createRadialGradient(
    centerX(), centerY(), 50,
    centerX(), centerY(), 500
  );
  grad.addColorStop(0,"#111");
  grad.addColorStop(1,"#050505");

  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 💖 TREE
const colors = ["#ff4d6d","#ff758f","#ff8fa3"];
let hearts=[];
let branches=[];

function generateTree(){
  hearts=[];
  branches=[];

  let trunkTop = {
    x: centerX(),
    y: canvas.height*0.55
  };

  for(let i=0;i<2200;i++){
    let t=Math.random()*Math.PI*2;
    let r=Math.random();

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let hx=centerX()+x*18*r;
    let hy=centerY()+y*18*r;

    hearts.push({
      x:hx,
      y:hy,
      size:Math.random()*3+5,
      color:colors[Math.floor(Math.random()*colors.length)],
      phase:Math.random()*1000
    });

    // 🌿 curved branch (static)
    branches.push({
      startX: trunkTop.x,
      startY: trunkTop.y,
      cpX: (trunkTop.x + hx)/2 + (Math.random()*40-20),
      cpY: (trunkTop.y + hy)/2,
      endX: hx,
      endY: hy
    });
  }
}
generateTree();

let mouse={x:0
